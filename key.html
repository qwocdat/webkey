<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhập Key - Truy cập</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }
        h2 {
            margin-bottom: 1.5rem;
            color: #333;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover {
            background: #5a67d8;
        }
        .message {
            margin-top: 1rem;
            color: #e53e3e;
            font-size: 0.9rem;
            min-height: 1.2rem;
        }
        .note {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #718096;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Nhập Key truy cập</h2>
        <input type="text" id="keyInput" placeholder="Nhập key của bạn..." autofocus>
        <button onclick="verifyKey()">Xác minh</button>
        <div id="message" class="message"></div>
        <div class="note">Key sẽ được xác thực và chuyển đến nội dung chính</div>
    </div>

    <script>
        function verifyKey() {
            const inputKey = document.getElementById('keyInput').value.trim();
            const messageDiv = document.getElementById('message');

            if (!inputKey) {
                messageDiv.textContent = 'Vui lòng nhập key!';
                return;
            }

            // Lấy danh sách key từ localStorage
            const keys = JSON.parse(localStorage.getItem('validKeys')) || [];

            // Tìm key trong mảng
            const keyIndex = keys.findIndex(k => k.key === inputKey);

            if (keyIndex === -1) {
                messageDiv.textContent = 'Key không hợp lệ!';
                return;
            }

            const keyData = keys[keyIndex];

            // Kiểm tra số lần sử dụng còn lại
            if (keyData.remainingUses <= 0) {
                messageDiv.textContent = 'Key đã hết lượt sử dụng!';
                // Xóa key hết lượt
                keys.splice(keyIndex, 1);
                localStorage.setItem('validKeys', JSON.stringify(keys));
                return;
            }

            // Giảm số lượt sử dụng
            keyData.remainingUses -= 1;

            // Nếu hết lượt thì xóa key khỏi danh sách
            if (keyData.remainingUses <= 0) {
                keys.splice(keyIndex, 1);
            } else {
                // Cập nhật lại mảng
                keys[keyIndex] = keyData;
            }

            // Lưu lại localStorage
            localStorage.setItem('validKeys', JSON.stringify(keys));

            // Chuyển hướng sang index.html
            window.location.href = 'index.html';
        }

        // Xử lý nhấn Enter
        document.getElementById('keyInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyKey();
            }
        });
    </script>
</body>
</html>
