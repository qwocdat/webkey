<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quocdat</title>
    <!-- Firebase SDK (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
    <style>
        /* Giữ nguyên style từ phiên bản trước (tôi đã rút gọn để dễ đọc, bạn có thể copy lại từ file cũ) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Mono', 'Menlo', monospace;
            background: #0b0f14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .matrix-bg { /* ... */ }
        .container { /* ... */ }
        .header { /* ... */ }
        .lock-icon { /* ... */ }
        h2 { color: #0f0; }
        .sub { color: rgba(0,255,0,0.6); }
        .input-group { margin: 2rem 0 1.5rem; }
        label { color: #0f0; }
        .key-input-wrapper {
            background: rgba(0,0,0,0.6);
            border-radius: 18px;
            border: 1px solid #0f0;
            padding: 0.1rem 0.1rem 0.1rem 1.2rem;
            backdrop-filter: blur(4px);
        }
        .key-input-wrapper input {
            background: transparent;
            border: none;
            padding: 1rem 0.5rem;
            font-family: inherit;
            font-size: 1.2rem;
            color: #0f0;
            caret-color: #0f0;
            outline: none;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.4rem;
            background-color: #0f0;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
        button {
            width: 100%;
            background: rgba(0,20,0,0.8);
            border: 1px solid #0f0;
            padding: 1rem;
            border-radius: 28px;
            color: #0f0;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.25s;
        }
        button:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px #0f0;
        }
        .message {
            min-height: 2.5rem;
            padding: 0.75rem;
            border-radius: 14px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,0,0,0.3);
            color: #ff4d4d;
            text-align: center;
        }
        .message.success { border-color: #0f0; color: #0f0; background: rgba(0,255,0,0.05); }
        .note { margin-top: 2rem; color: rgba(0,255,0,0.3); font-size:0.75rem; text-align:center; }
        @media (max-width:480px) { .container { padding:2rem 1.2rem; } }
    </style>
</head>
<body>
    <div class="matrix-bg"></div>

    <div class="container">
        <div class="header">
            <div class="lock-icon">⎇ ⚡</div>
            <h2>Hệ Thống Xác Thực</h2>
            <div class="sub">vui lòng liên hệ admin để nhận key</div>
        </div>

        <div class="input-group">
            <label for="keyInput">> access key</label>
            <div class="key-input-wrapper">
                <input type="text" id="keyInput" placeholder="0xK3Y..." autofocus>
                <span class="cursor"></span>
            </div>
        </div>

        <button onclick="verifyKey()">⏎ verify</button>
        <div id="message" class="message">⛔ waiting for input...</div>
        <div class="note">quocdat</div>
    </div>

    <script>
        // 🔥 CẤU HÌNH FIREBASE CỦA BẠN
        const firebaseConfig = {
            apiKey: "AIzaSyDM5EOHtjhxrWvGxL7hegMi5n0TbdV9cpw",
            authDomain: "taikhoan-fc704.firebaseapp.com",
            databaseURL: "https://taikhoan-fc704-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "taikhoan-fc704",
            storageBucket: "taikhoan-fc704.firebasestorage.app",
            messagingSenderId: "867203109533",
            appId: "1:867203109533:web:d8af9bf7900162def37a74",
            measurementId: "G-8WGZQPSM68"
        };

        // Khởi tạo Firebase (không cần analytics nếu không dùng)
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const keysRef = database.ref('keys');

        function verifyKey() {
            const inputKey = document.getElementById('keyInput').value.trim();
            const messageDiv = document.getElementById('message');

            if (!inputKey) {
                messageDiv.textContent = '⛔ KEY MISSING';
                messageDiv.classList.remove('success');
                return;
            }

            keysRef.child(inputKey).once('value', (snapshot) => {
                const keyData = snapshot.val();

                if (!keyData) {
                    messageDiv.textContent = '⛔ INVALID KEY';
                    messageDiv.classList.remove('success');
                    return;
                }

                if (keyData.remainingUses <= 0) {
                    messageDiv.textContent = '⛔ KEY EXPIRED';
                    messageDiv.classList.remove('success');
                    keysRef.child(inputKey).remove();
                    return;
                }

                const newRemaining = keyData.remainingUses - 1;
                
                if (newRemaining <= 0) {
                    keysRef.child(inputKey).remove();
                } else {
                    keysRef.child(inputKey).update({ remainingUses: newRemaining });
                }

                messageDiv.textContent = '✅ ACCESS GRANTED · REDIRECTING...';
                messageDiv.classList.add('success');

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 500);
            });
        }

        // Xử lý nhấn Enter
        document.getElementById('keyInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyKey();
        });

        document.getElementById('keyInput').addEventListener('focus', function() {
            document.getElementById('message').textContent = '⏎ enter key to proceed';
        });
    </script>
</body>
</html>
