<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
    margin:0;
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:-apple-system, BlinkMacSystemFont;
    padding:20px;
}

.popup{
    width:100%;
    max-width:340px;
    background:#1c1c1e;
    border-radius:22px;
    padding:24px 20px;
    text-align:center;
    box-shadow:0 25px 60px rgba(0,0,0,0.6);
}

h3{
    color:#fff;
    margin-bottom:10px;
    font-weight:500;
}

input{
    width:100%;
    padding:14px;
    border-radius:14px;
    border:none;
    margin:12px 0;
    background:#2c2c2e;
    color:#fff;
    text-align:center;
    font-size:17px;
    outline:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#0a84ff;
    color:#fff;
    font-size:17px;
    font-weight:500;
}

.progress{
    margin-top:12px;
    height:5px;
    background:#2c2c2e;
    border-radius:10px;
    overflow:hidden;
    display:none;
}

.bar{
    height:100%;
    width:0%;
    background:#0a84ff;
    border-radius:10px;
}

.message{
    margin-top:12px;
    font-size:14px;
    color:#aaa;
}

.success{ color:#30d158; }
.error{ color:#ff453a; }
</style>
</head>

<body>

<div class="popup">
    <h3>Nhập Key</h3>
    <input id="keyInput" placeholder="Enter key">
    <button onclick="startVerify()">Xác minh</button>

    <div class="progress" id="progress">
        <div class="bar" id="bar"></div>
    </div>

    <div class="message" id="msg">Chờ nhập key...</div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE",
    databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("keys");

function startVerify(){
    const key = document.getElementById("keyInput").value.trim().toUpperCase();
    const msg = document.getElementById("msg");
    const bar = document.getElementById("bar");
    const progress = document.getElementById("progress");

    if(!key){
        msg.textContent = "Nhập key đi";
        msg.className = "message error";
        return;
    }

    bar.style.width = "0%";
    progress.style.display = "block";

    msg.textContent = "Đang xác minh...";
    msg.className = "message";

    let percent = 0;

    const interval = setInterval(()=>{
        percent += 100/60;
        bar.style.width = percent + "%";

        if(percent >= 100){
            clearInterval(interval);
            verifyKey(key);
        }
    },50);
}

function verifyKey(key){
    const msg = document.getElementById("msg");
    const ref = db.child(key);

    ref.transaction(current=>{
        if(current === null){
            return current;
        }

        if(current.remainingUses <= 0){
            return current;
        }

        current.remainingUses--;

        if(current.remainingUses <= 0){
            return null;
        }

        return current;
    }, (err, committed, snap)=>{

        if(err){
            msg.textContent = "Lỗi hệ thống";
            msg.className = "message error";
            return;
        }

        if(!snap.exists()){
            msg.textContent = "Key không tồn tại";
            msg.className = "message error";
            return;
        }

        if(!committed){
            msg.textContent = "Key hết hạn";
            msg.className = "message error";
            return;
        }

        msg.textContent = "Xác minh thành công";
        msg.className = "message success";

        setTimeout(()=>{
            window.location.href = "index.html";
        },1000);
    });
}

document.getElementById("keyInput").addEventListener("keypress", e=>{
    if(e.key === "Enter") startVerify();
});
</script>

</body>
</html>
