<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Firebase Key Management</title>
    <!-- Firebase SDK (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
    <style>
        /* Giữ nguyên style của panel (tôi chỉ để phần cần thiết, bạn copy lại từ file cũ) */
        body { font-family: Arial, sans-serif; background: #f7fafc; margin:0; padding:2rem; }
        .container { max-width:800px; margin:0 auto; background:white; border-radius:10px; padding:2rem; box-shadow:0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color:#2d3748; }
        .form-group { margin-bottom:1rem; }
        label { display:block; margin-bottom:0.5rem; font-weight:600; color:#4a5568; }
        input[type="text"], select { width:100%; padding:0.75rem; border:1px solid #e2e8f0; border-radius:5px; font-size:1rem; }
        button { background:#667eea; color:white; border:none; padding:0.75rem 1.5rem; border-radius:5px; cursor:pointer; margin-right:0.5rem; }
        button.danger { background:#e53e3e; }
        table { width:100%; border-collapse:collapse; margin-top:2rem; }
        th, td { text-align:left; padding:0.75rem; border-bottom:1px solid #e2e8f0; }
        th { background:#edf2f7; }
        .key-display { font-family:monospace; background:#f7fafc; padding:0.25rem 0.5rem; border-radius:3px; }
        .message { padding:1rem; background:#c6f6d5; color:#22543d; border-radius:5px; margin-bottom:1rem; display:none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 Admin Panel - Firebase Key Management</h1>
        <div id="successMessage" class="message"></div>

        <div class="form-group">
            <label for="keyInput">Key (để trống để tự tạo ngẫu nhiên)</label>
            <input type="text" id="keyInput" placeholder="Nhập key hoặc để trống">
        </div>

        <div class="form-group">
            <label for="keyType">Loại key</label>
            <select id="keyType">
                <option value="single">Dùng một lần</option>
                <option value="multi">Dùng nhiều lần (tối đa 9999 lần)</option>
            </select>
        </div>

        <button onclick="generateKey()">➕ Tạo key</button>
        <button class="danger" onclick="clearAllKeys()">🗑️ Xóa tất cả key</button>

        <h2>Danh sách key hiện có (real-time)</h2>
        <table>
            <thead><tr><th>Key</th><th>Loại</th><th>Số lượt còn lại</th><th>Thao tác</th></tr></thead>
            <tbody id="keyList"><tr><td colspan="4" style="text-align:center;">Đang tải dữ liệu...</td></tr></tbody>
        </table>
    </div>

    <script>
        // 🔥 CẤU HÌNH FIREBASE (giống hệt key.html)
        const firebaseConfig = {
            apiKey: "AIzaSyDM5EOHtjhxrWvGxL7hegMi5n0TbdV9cpw",
            authDomain: "taikhoan-fc704.firebaseapp.com",
            databaseURL: "https://taikhoan-fc704-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "taikhoan-fc704",
            storageBucket: "taikhoan-fc704.firebasestorage.app",
            messagingSenderId: "867203109533",
            appId: "1:867203109533:web:d8af9bf7900162def37a74",
            measurementId: "G-8WGZQPSM68"
        };

        // Khởi tạo Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const keysRef = database.ref('keys');

        // Hàm tạo key ngẫu nhiên
        function generateRandomKey(length = 8) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < length; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
            return result;
        }

        // Render danh sách key real-time
        function renderKeys(snapshot) {
            const keys = snapshot.val();
            const tbody = document.getElementById('keyList');
            if (!keys) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Chưa có key nào</td></tr>';
                return;
            }
            let html = '';
            Object.keys(keys).forEach(keyId => {
                const k = keys[keyId];
                const typeText = k.maxUses === 1 ? 'Một lần' : 'Nhiều lần';
                const remaining = k.remainingUses > 999 ? '∞' : k.remainingUses;
                html += `<tr><td><span class="key-display">${k.key}</span></td><td>${typeText}</td><td>${remaining}</td>
                        <td><button onclick="deleteKey('${k.key}')">Xóa</button></td></tr>`;
            });
            tbody.innerHTML = html;
        }

        keysRef.on('value', renderKeys);

        // Tạo key mới
        function generateKey() {
            const keyInput = document.getElementById('keyInput').value.trim();
            const keyType = document.getElementById('keyType').value;
            const newKey = keyInput || generateRandomKey(10);

            keysRef.child(newKey).once('value', snapshot => {
                if (snapshot.exists()) {
                    showMessage('Key đã tồn tại!', 'error');
                    return;
                }
                const keyData = {
                    key: newKey,
                    maxUses: keyType === 'single' ? 1 : 9999,
                    remainingUses: keyType === 'single' ? 1 : 9999
                };
                keysRef.child(newKey).set(keyData)
                    .then(() => {
                        document.getElementById('keyInput').value = '';
                        showMessage(`Đã tạo key: ${newKey}`, 'success');
                    })
                    .catch(err => showMessage('Lỗi: ' + err.message, 'error'));
            });
        }

        // Xoá key
        function deleteKey(key) {
            if (confirm('Xoá key này?')) {
                keysRef.child(key).remove()
                    .then(() => showMessage('Đã xoá key', 'success'))
                    .catch(err => showMessage('Lỗi: ' + err.message, 'error'));
            }
        }

        // Xoá tất cả
        function clearAllKeys() {
            if (confirm('Xoá tất cả key?')) {
                keysRef.remove()
                    .then(() => showMessage('Đã xoá tất cả key', 'success'))
                    .catch(err => showMessage('Lỗi: ' + err.message, 'error'));
            }
        }

        function showMessage(text, type = 'success') {
            const msg = document.getElementById('successMessage');
            msg.style.display = 'block';
            msg.textContent = text;
            msg.style.background = type === 'success' ? '#c6f6d5' : '#fed7d7';
            msg.style.color = type === 'success' ? '#22543d' : '#742a2a';
            setTimeout(() => msg.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
