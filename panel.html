<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0; min-height: 100vh;
    background: linear-gradient(135deg, #121212, #000000);
    
    background-image: radial-gradient(circle at 50% 10%, #2a2a2d 0%, transparent 60%);
    display: flex; justify-content: center; align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.glass-box {
    width: 90%; max-width: 340px;
    padding: 30px 25px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.05); 
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    text-align: center;
}

h3 { color: #fff; margin-top: 0; margin-bottom: 20px; font-weight: 500; }

input, select {
    width: 100%; padding: 15px; margin-bottom: 12px;
    border-radius: 14px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: #fff; font-size: 16px; outline: none; transition: 0.3s;
}

input:focus, select:focus {
    border-color: #0a84ff; background: rgba(0, 0, 0, 0.4);
}

select option { background: #1c1c1e; color: #fff; }

button {
    width: 100%; padding: 15px; border: none; border-radius: 14px;
    background: rgba(10, 132, 255, 0.85);
    color: #fff; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px);
}

button:hover { background: rgba(10, 132, 255, 1); transform: translateY(-1px); }
button:disabled { background: #555; cursor: not-allowed; }

#msg { margin-top: 15px; font-size: 14px; min-height: 20px; }
.success { color: #32d74b; }
.error { color: #ff453a; }
</style>
</head>

<body>

<div class="glass-box">
    <h3>Tạo Key Mới</h3>
    
    <input id="keyInput" placeholder="Nhập mã Key (chữ hoặc số)" autocomplete="off">
    
    <select id="keyType" onchange="toggleDaysInput()">
        <option value="ONCE">Dùng 1 Lần</option>
        <option value="INFINITE">Dùng Vô Hạn</option>
        <option value="TIME">Theo Số Ngày</option>
    </select>

    <input id="daysInput" type="number" placeholder="Nhập số ngày" style="display: none;" min="1">

    <button id="btnCreate" onclick="createKey()">Tạo Key</button>
    <div id="msg"></div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE",
    databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("keys");

function toggleDaysInput() {
    const type = document.getElementById("keyType").value;
    document.getElementById("daysInput").style.display = (type === "TIME") ? "block" : "none";
}

function normalizeKey(k) {
    return k.trim().toUpperCase().replace(/\s+/g, "");
}

async function createKey() {
    const inputEl = document.getElementById("keyInput");
    const typeEl = document.getElementById("keyType");
    const daysEl = document.getElementById("daysInput");
    const msgEl = document.getElementById("msg");
    const btnEl = document.getElementById("btnCreate");

    const key = normalizeKey(inputEl.value);
    const type = typeEl.value;

    msgEl.className = "";
    if (!key) {
        msgEl.textContent = "Vui lòng nhập key!";
        msgEl.className = "error"; return;
    }

    let keyData = { 
        type: type, 
        createdAt: firebase.database.ServerValue.TIMESTAMP 
    };

    if (type === "ONCE") {
        keyData.used = false;
    } else if (type === "TIME") {
        const days = parseInt(daysEl.value);
        if (!days || days <= 0) {
            msgEl.textContent = "Nhập số ngày hợp lệ!";
            msgEl.className = "error"; return;
        }
        
        keyData.expiresAt = Date.now() + (days * 24 * 60 * 60 * 1000);
    }

    try {
        btnEl.disabled = true; btnEl.textContent = "Đang tạo...";
        await db.child(key).set(keyData);
        msgEl.textContent = "Đã tạo Key: " + key;
        msgEl.className = "success";
        inputEl.value = ""; 
    } catch (err) {
        msgEl.textContent = "Lỗi kết nối Firebase!";
        msgEl.className = "error";
    } finally {
        btnEl.disabled = false; btnEl.textContent = "Tạo Key";
    }
}
</script>
</body>
</html>
