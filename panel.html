<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
    margin:0;
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:-apple-system;
}

.box{
    width:320px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.15);
    text-align:center;
}

input{
    width:100%;
    padding:14px;
    border-radius:14px;
    border:none;
    margin:10px 0;
    background:rgba(255,255,255,0.1);
    color:#fff;
    text-align:center;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#0a84ff;
    color:#fff;
}

p{color:#fff;font-size:14px;}
</style>
</head>

<body>

<div class="box">
    <input id="key" placeholder="Nhập key">
    <button onclick="create()">Tạo key</button>
    <p id="msg"></p>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE",
    databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("keys");

function normalizeKey(k){
    return k.trim().toUpperCase().replace(/\s+/g,"");
}

function create(){
    const key = normalizeKey(document.getElementById("key").value);
    const msg = document.getElementById("msg");

    if(!key){
        msg.textContent = "Nhập key";
        return;
    }

    db.child(key).set({
        used:false
    });

    msg.textContent = "Đã tạo: " + key;
}
</script>

</body>
</html>
