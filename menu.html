<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DAT Premium Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #000; --glass-bg: rgba(30, 30, 40, 0.45); --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #0A84FF; --text: #FFF; --subtext: #8E8E93;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; background-image: radial-gradient(circle at top right, rgba(10, 132, 255, 0.15), transparent 50%), radial-gradient(circle at bottom left, rgba(138, 43, 226, 0.15), transparent 50%); user-select: none; }
        
        .app-container { width: 100%; max-width: 500px; margin: 0 auto; padding: max(20px, env(safe-area-inset-top)) 20px 40px; }
        .glass { background: var(--glass-bg); backdrop-filter: saturate(180%) blur(25px); -webkit-backdrop-filter: saturate(180%) blur(25px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        /* Login View & Animation */
        #loginView { display: none; text-align: center; margin-top: 30vh; animation: fadeUp 0.6s var(--spring); }
        .logo-login { width: 80px; height: 80px; background: linear-gradient(135deg, #0A84FF, #5E5CE6); border-radius: 22px; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; font-size: 30px; font-weight: bold; }
        .input-key { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: #fff; padding: 18px 20px; border-radius: 18px; font-size: 16px; outline: none; margin-bottom: 20px; text-align: center; text-transform: uppercase; transition: 0.3s; }

        #panelView { display: none; animation: fadeUp 0.6s var(--spring); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .profile { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; background: url('https://api.dicebear.com/7.x/avataaars/svg?seed=DatVIP') center/cover; border: 2px solid var(--primary); }
        .info h1 { font-size: 18px; font-weight: 700; margin-bottom: 3px; }
        .info p { font-size: 12px; color: var(--primary); }
        .clock #time { font-size: 20px; font-weight: bold; }
        .clock #date { font-size: 11px; color: var(--subtext); }

        .widgets { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .widget { padding: 15px; border-radius: 20px; }
        .widget .title { font-size: 12px; color: var(--subtext); margin-bottom: 8px; font-weight: 600; }
        .widget .val { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
        .progress-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .progress-bar { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

        .feature-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .feature-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; border-radius: 20px; }
        
        /* TOGGLE IOS - CỤC TRẮNG TRONG SUỐT VÀ PHÌNH TO */
        .ios-toggle { position: relative; width: 52px; height: 32px; border-radius: 32px; background: rgba(255,255,255,0.15); cursor: pointer; transition: background 0.3s ease; touch-action: none; }
        .ios-toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 28px; height: 28px; background: #fff; border-radius: 50%; box-shadow: 0 3px 8px rgba(0,0,0,0.15); transition: transform 0.3s var(--spring), background 0.3s, backdrop-filter 0.3s; }
        .ios-toggle.on { background: #30D158; }
        .ios-toggle.on::after { transform: translateX(20px); }
        .ios-toggle.pressing::after { transform: scale(1.3); background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); box-shadow: none; }
        .ios-toggle.on.pressing::after { transform: translateX(20px) scale(1.3); }

        .btn { width: 100%; padding: 18px; border: none; border-radius: 18px; font-size: 17px; font-weight: 700; color: #fff; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(90deg, #0A84FF, #5E5CE6); }
        .btn-logout { background: transparent; border: 1px solid rgba(255,69,58,0.3); color: #FF453A; margin-top: 15px; padding: 12px; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.4s; z-index: 100; }
        .overlay.show { opacity: 1; pointer-events: auto; }
        .action-modal { background: rgba(20,20,30,0.85); border: 1px solid var(--glass-border); width: 85%; max-width: 350px; border-radius: 28px; padding: 30px 25px; text-align: center; transform: scale(0.9); transition: 0.4s var(--spring); }
        .overlay.show .action-modal { transform: scale(1); }
        
        #actStatus { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
        .big-progress { width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin-bottom: 15px; }
        .big-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #0A84FF, #30D158); border-radius: 5px; transition: width 0.2s linear; }
        #actPercent { font-size: 24px; font-weight: bold; color: var(--primary); }

        #gameButtons { display: none; margin-top: 15px; flex-direction: column; gap: 10px; }
        .btn-game { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #fff; padding: 15px; border-radius: 16px; cursor: pointer; font-size: 15px; font-weight: 600; }

        /* --- HIỆU ỨNG FACE ID --- */
        #faceIdOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 9999; opacity: 0; transition: opacity 0.3s ease; }
        #faceIdOverlay.show { opacity: 1; }
        .face-id-box { width: 160px; height: 160px; background: rgba(40,40,40,0.7); border-radius: 30px; display: flex; justify-content: center; align-items: center; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: scale(0.8); transition: transform 0.4s var(--spring); }
        #faceIdOverlay.show .face-id-box { transform: scale(1); }
        
        .fid-icon { width: 60px; height: 60px; margin-bottom: 15px; transform-style: preserve-3d; animation: rotate3D 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes rotate3D { 0% { transform: rotateY(-180deg) scale(0.5); opacity: 0; } 100% { transform: rotateY(0deg) scale(1); opacity: 1; } }
        
        .fid-circle { stroke-dasharray: 166; stroke-dashoffset: 166; stroke-width: 4; stroke-miterlimit: 10; stroke: #FFF; fill: none; animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) 0.2s forwards; }
        .fid-check { transform-origin: 50% 50%; stroke-dasharray: 48; stroke-dashoffset: 48; stroke-width: 4; stroke: #FFF; fill: none; animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.6s forwards; }
        @keyframes stroke { 100% { stroke-dashoffset: 0; } }

        .toast { position: fixed; top: -60px; left: 50%; transform: translateX(-50%); background: #000; border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; padding: 12px 25px; font-size: 14px; font-weight: bold; z-index: 1000; transition: 0.5s var(--spring); }
        .toast.show { top: max(15px, env(safe-area-inset-top)); }
    </style>
</head>
<body>

    <div class="toast" id="toast">Thông báo</div>

    <div id="faceIdOverlay">
        <div class="face-id-box">
            <svg class="fid-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                <circle class="fid-circle" cx="26" cy="26" r="25"/>
                <path class="fid-check" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
            </svg>
            <div style="color: white; font-weight: bold; font-size: 16px;">Thành công</div>
        </div>
    </div>

    <div class="app-container">
        <div id="loginView">
            <div class="logo-login">FF</div>
            <h2 style="margin-bottom: 10px;">Xác Thực Key</h2>
            <p style="color: var(--subtext); font-size: 14px; margin-bottom: 30px;">Vui lòng nhập Key để sử dụng Panel</p>
            <input type="text" id="keyInput" class="input-key" placeholder="DAT-XXXX-XXXX-XXXX" autocomplete="off">
            <button class="btn btn-primary" onclick="verifyKey()">ĐĂNG NHẬP</button>
        </div>

        <div id="panelView">
            <div class="glass header">
                <div class="profile">
                    <div class="avatar"></div>
                    <div class="info">
                        <h1>DAT FF Panel</h1>
                        <p>👑 Premium <span id="keyExpText" style="color:#E5E5EA;">Đang tải...</span></p>
                    </div>
                </div>
                <div class="clock">
                    <div id="time">00:00</div>
                    <div id="date">--/--/----</div>
                </div>
            </div>

            <div class="widgets">
                <div class="glass widget">
                    <div class="title">RAM SỬ DỤNG</div>
                    <div class="val" id="ramVal">0 / 8 GB</div>
                    <div class="progress-bg"><div class="progress-bar" id="ramBar" style="background:#FF9F0A;"></div></div>
                </div>
                <div class="glass widget">
                    <div class="title">MỨC CPU</div>
                    <div class="val" id="cpuVal">0%</div>
                    <div class="progress-bg"><div class="progress-bar" id="cpuBar" style="background:#0A84FF;"></div></div>
                </div>
                <div class="glass widget">
                    <div class="title">FPS TRÒ CHƠI</div>
                    <div class="val" id="fpsVal" style="color:#30D158;">60 FPS</div>
                </div>
                <div class="glass widget">
                    <div class="title">PING MẠNG</div>
                    <div class="val" id="pingVal" style="color:#0A84FF;">35 ms</div>
                </div>
            </div>

            <div class="feature-list">
                <div class="glass feature-item">
                    <div class="f-name">Tối ưu bộ nhớ RAM</div>
                    <div class="ios-toggle"></div>
                </div>
                <div class="glass feature-item">
                    <div class="f-name">Hỗ trợ kéo tâm</div>
                    <div class="ios-toggle"></div>
                </div>
                <div class="glass feature-item">
                    <div class="f-name">Ổn định FPS (60)</div>
                    <div class="ios-toggle"></div>
                </div>
                <div class="glass feature-item">
                    <div class="f-name">Xóa Cache Game</div>
                    <div class="ios-toggle"></div>
                </div>
            </div>

            <button class="btn btn-primary" onclick="startActivation()">KÍCH HOẠT</button>
            <button class="btn btn-logout" onclick="logout()">Đăng xuất</button>
        </div>
    </div>

    <div class="overlay" id="actModal">
        <div class="action-modal">
            <div id="actProcess">
                <div id="actStatus">Đang khởi tạo...</div>
                <div class="big-progress"><div class="big-bar" id="actBar"></div></div>
                <div id="actPercent">0%</div>
            </div>
            
            <div id="gameButtons">
                <div style="display:flex; justify-content:center; align-items:center; gap:10px; color:#30D158; margin-bottom:15px; font-size:18px; font-weight:bold;">
                    <svg style="width:35px; height:35px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                        <circle cx="26" cy="26" r="25" fill="none" stroke="#30D158" stroke-width="3"/>
                        <path fill="none" stroke="#30D158" stroke-width="3" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                    </svg>
                    <span>Đã sẵn sàng!</span>
                </div>
                <button class="btn btn-game" onclick="openGame('com.dts.freefireth')">Mở Free Fire</button>
                <button class="btn btn-game" onclick="openGame('com.dts.freefiremax')">Mở Free Fire MAX</button>
                <button class="btn btn-logout" style="border:none; margin-top:0;" onclick="closeFeedback(); closeModal();">Đóng</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE", databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "keyquocdat" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();

        let checkInterval;
        
        // --- ÂM THANH BÍP & RUNG (HAPTIC) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function triggerFeedback() {
            // Rung mạnh
            if(navigator.vibrate) navigator.vibrate([60]);
            
            // Phát tiếng Bíp
            if(!audioCtx) audioCtx = new AudioContext();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); // Tần số bíp cao
            
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        window.onload = () => {
            startClock(); startWidgets(); setupToggles();
            const savedKey = localStorage.getItem('ff_saved_key');
            if(savedKey) authenticate(savedKey, true); else showView('loginView');
        };

        function showView(id) {
            document.getElementById('loginView').style.display = id === 'loginView' ? 'block' : 'none';
            document.getElementById('panelView').style.display = id === 'panelView' ? 'block' : 'none';
        }

        // --- TOGGLE CỤC TRẮNG KÈM FEEDBACK ---
        function setupToggles() {
            document.querySelectorAll('.ios-toggle').forEach(toggle => {
                let isDragging = false;
                
                toggle.addEventListener('touchstart', (e) => {
                    isDragging = true;
                    toggle.classList.add('pressing'); 
                    triggerFeedback();
                });

                toggle.addEventListener('touchmove', (e) => {
                    if(!isDragging) return;
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = toggle.getBoundingClientRect();
                    const x = touch.clientX - rect.left;
                    
                    if(x > rect.width / 2) { toggle.classList.add('on'); } 
                    else { toggle.classList.remove('on'); }
                });

                toggle.addEventListener('touchend', () => {
                    isDragging = false;
                    toggle.classList.remove('pressing');
                    triggerFeedback();
                });
                
                toggle.addEventListener('click', () => {
                    toggle.classList.toggle('on');
                    triggerFeedback();
                });
            });
        }

        function verifyKey() { 
            triggerFeedback();
            const key = document.getElementById('keyInput').value.trim().toUpperCase(); 
            if(!key) return showToast('⚠️ Vui lòng nhập Key!'); 
            authenticate(key, false); 
        }

        function authenticate(key, isAuto) {
            db.ref('vip_ff_keys/' + key).once('value').then(snap => {
                if(!snap.exists() || (snap.val().expiresAt !== "unlimited" && Date.now() > snap.val().expiresAt)) { 
                    logout(); 
                    return showToast('❌ Key không hợp lệ hoặc hết hạn!'); 
                }
                localStorage.setItem('ff_saved_key', key);
                
                manageExpiration(snap.val().expiresAt);

                if(!isAuto) {
                    // --- HIỆU ỨNG FACE ID THÀNH CÔNG ---
                    const fid = document.getElementById('faceIdOverlay');
                    fid.style.display = 'flex';
                    setTimeout(() => fid.classList.add('show'), 10);
                    
                    // Ẩn Face ID và vào Panel sau 1.5 giây
                    setTimeout(() => {
                        fid.classList.remove('show');
                        setTimeout(() => {
                            fid.style.display = 'none';
                            showView('panelView');
                        }, 300);
                    }, 1500);
                } else {
                    showView('panelView');
                }
            });
        }

        function manageExpiration(expiresAt) {
            if(expiresAt === "unlimited") return document.getElementById('keyExpText').innerText = "- Vĩnh viễn";
            checkInterval = setInterval(() => {
                const diff = expiresAt - Date.now();
                if(diff <= 0) { showToast("❌ Key hết hạn!"); logout(); }
                else { document.getElementById('keyExpText').innerText = `- Còn ${Math.floor(diff/86400000)}d`; }
            }, 60000);
        }
        function logout() { triggerFeedback(); localStorage.removeItem('ff_saved_key'); showView('loginView'); }

        function startClock() { setInterval(() => { const now = new Date(); document.getElementById('time').innerText = now.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'}); document.getElementById('date').innerText = now.toLocaleDateString('vi-VN'); }, 1000); }

        function startWidgets() {
            setInterval(() => {
                const ram = (4.5 + Math.random()*2).toFixed(1);
                document.getElementById('ramVal').innerText = ram + ' / 8 GB';
                document.getElementById('ramBar').style.width = (ram / 8 * 100) + '%';
                
                const cpu = Math.floor(20 + Math.random()*40);
                document.getElementById('cpuVal').innerText = cpu + '%';
                document.getElementById('cpuBar').style.width = cpu + '%';
            }, 2000);

            setInterval(() => {
                const fps = Math.floor(Math.random() * (61 - 59 + 1)) + 59;
                document.getElementById('fpsVal').innerText = fps + ' FPS';
            }, 600);

            setInterval(() => {
                const ping = Math.floor(Math.random() * (45 - 32 + 1)) + 32;
                document.getElementById('pingVal').innerText = ping + ' ms';
            }, 1000);
        }

        function startActivation() {
            triggerFeedback();
            document.getElementById('actModal').classList.add('show');
            document.getElementById('actProcess').style.display = 'block';
            document.getElementById('gameButtons').style.display = 'none';
            
            let pct = 0;
            let sim = setInterval(() => {
                pct += 4;
                if(pct >= 100) {
                    pct = 100; clearInterval(sim);
                    setTimeout(() => {
                        document.getElementById('actProcess').style.display = 'none';
                        document.getElementById('gameButtons').style.display = 'flex';
                        triggerFeedback(); // Rung báo hiệu đã load xong 100%
                    }, 500);
                }
                document.getElementById('actBar').style.width = pct + '%';
                document.getElementById('actPercent').innerText = pct + '%';
                const txt = document.getElementById('actStatus');
                if(pct < 30) txt.innerText = "Đang kiểm tra..."; else if(pct < 70) txt.innerText = "Đang áp dụng tối ưu..."; else txt.innerText = "Đang hoàn tất...";
            }, 100);
        }

        function closeModal() { document.getElementById('actModal').classList.remove('show'); }
        function closeFeedback() { triggerFeedback(); }

        // --- MỞ THẲNG GAME KHÔNG QUA APP STORE / CH PLAY ---
        function openGame(pkg) {
            triggerFeedback();
            // Xóa browser_fallback_url để ngăn chuyển hướng sang Store. Chỉ ép mở App.
            const intentUrl = `intent://#Intent;package=${pkg};action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;launchFlags=0x10000000;end`;
            window.location.href = intentUrl;
        }

        function showToast(msg) { 
            const t = document.getElementById('toast'); 
            t.innerText = msg; 
            t.classList.add('show'); 
            setTimeout(() => t.classList.remove('show'), 2500); 
        }
    </script>
</body>
</html>
