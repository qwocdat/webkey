<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAT FF PANEL</title>
    <style>
        /* CSS Dùng chung */
        :root {
            --primary-blue: #0078ff;
            --primary-purple: #8a2be2;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #050505, #0d0d26, #120524);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Container kính */
        .glass-panel {
            width: 90%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 35px 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), inset 0 0 15px rgba(255,255,255,0.03);
            animation: scaleFadeIn 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            position: relative;
        }

        @keyframes scaleFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ---------------- VIEW ĐĂNG NHẬP ---------------- */
        #loginView { display: none; text-align: center; }
        
        .logo-login {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-purple));
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; font-weight: bold;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
        }

        h2.title {
            font-size: 22px; margin-bottom: 25px; letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group input {
            width: 100%; padding: 18px 20px;
            background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
            border-radius: 18px; color: #fff; font-size: 16px;
            outline: none; transition: 0.3s;
        }
        .input-group input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 15px rgba(0, 120, 255, 0.3);
        }

        /* Nút chung */
        .btn {
            position: relative; width: 100%; padding: 18px;
            border: none; border-radius: 18px;
            background: linear-gradient(90deg, var(--primary-blue), var(--primary-purple));
            color: #fff; font-size: 16px; font-weight: bold;
            cursor: pointer; overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 5px 15px rgba(0, 120, 255, 0.3);
        }
        .btn:active { transform: scale(0.96); }
        .btn:hover { box-shadow: 0 8px 25px rgba(138, 43, 226, 0.6); }

        /* ---------------- VIEW PANEL CHÍNH ---------------- */
        #panelView { display: none; }
        
        .panel-header {
            display: flex; align-items: center; margin-bottom: 30px;
            padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .avatar {
            width: 50px; height: 50px; border-radius: 50%;
            background: url('https://api.dicebear.com/7.x/avataaars/svg?seed=DatFF') center/cover;
            border: 2px solid var(--primary-purple);
            margin-right: 15px; box-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
        }

        .header-info h1 { font-size: 20px; margin-bottom: 5px; }
        .premium-badge {
            font-size: 12px; color: #00ffcc;
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.6);
            display: inline-block; padding: 2px 8px;
            background: rgba(0, 255, 204, 0.1); border-radius: 10px;
        }

        /* Danh sách chức năng & Toggle */
        .feature-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.2); padding: 18px 20px;
            border-radius: 20px; margin-bottom: 15px;
            border: 1px solid transparent; transition: 0.3s;
        }
        .feature-item:hover {
            background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1);
        }
        .feature-name {
            font-size: 16px; display: flex; align-items: center;
        }

        /* Nút hỏi chấm ? */
        .info-btn {
            display: inline-flex; justify-content: center; align-items: center;
            width: 20px; height: 20px; border-radius: 50%;
            background: rgba(255,255,255,0.1); font-size: 12px;
            margin-left: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
            transition: 0.2s;
        }
        .info-btn:hover { background: var(--primary-blue); color: #fff; }

        /* Nút Gạt (Toggle Switch) mượt mà */
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1); border-radius: 34px;
            transition: .4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .slider:before {
            position: absolute; content: ""; height: 20px; width: 20px;
            left: 3px; bottom: 3px; background-color: #aaa; border-radius: 50%;
            transition: .4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        input:checked + .slider {
            background: linear-gradient(90deg, var(--primary-blue), var(--primary-purple));
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
        }
        input:checked + .slider:before {
            transform: translateX(24px); background-color: white;
        }

        /* ---------------- GLASS POPUP (THÔNG BÁO 120FPS) ---------------- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; z-index: 100;
            transition: opacity 0.4s ease;
        }
        .overlay.active { opacity: 1; pointer-events: auto; }
        
        .popup-glass {
            width: 85%; max-width: 350px; background: rgba(20,20,30,0.7);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 25px;
            padding: 30px 25px; text-align: center;
            transform: translateY(30px) scale(0.9); opacity: 0;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .overlay.active .popup-glass { transform: translateY(0) scale(1); opacity: 1; }
        
        .popup-glass h3 { font-size: 20px; margin-bottom: 15px; color: var(--primary-blue); }
        .popup-glass p { font-size: 14px; line-height: 1.6; color: #ddd; margin-bottom: 25px; }
        
        .btn-close {
            background: rgba(255,255,255,0.1); color: #fff; padding: 12px 30px;
            border-radius: 15px; border: 1px solid var(--glass-border);
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-close:hover { background: rgba(255,255,255,0.2); }
        .btn-close:active { transform: scale(0.95); }

        /* ---------------- TOAST THÔNG BÁO ---------------- */
        .toast {
            position: fixed; top: -60px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 50, 50, 0.2); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 50, 50, 0.4); padding: 15px 30px;
            border-radius: 30px; color: #ff6b6b; font-weight: bold;
            transition: top 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 1000;
        }
        .toast.success {
            background: rgba(50, 255, 50, 0.2); border-color: rgba(50, 255, 50, 0.4);
            color: #6bff80;
        }
        .toast.show { top: 40px; }

        /* Ripple JS (Dùng chung) */
        .ripple {
            position: absolute; border-radius: 50%; background: rgba(255,255,255,0.3);
            transform: scale(0); animation: ripple-anim 0.6s linear; pointer-events: none;
        }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

    </style>
</head>
<body>

    <div class="glass-panel" id="mainPanel">
        
        <div id="loginView">
            <div class="logo-login">FF</div>
            <h2 class="title">ĐĂNG NHẬP KEY</h2>
            <div class="input-group">
                <input type="text" id="keyInput" placeholder="Nhập Key..." autocomplete="off">
            </div>
            <button class="btn" onclick="verifyKey(event)">XÁC NHẬN</button>
        </div>

        <div id="panelView">
            <div class="panel-header">
                <div class="avatar"></div>
                <div class="header-info">
                    <h1>DAT FF PANEL</h1>
                    <span class="premium-badge">Đã kích hoạt Premium</span>
                </div>
            </div>

            <div class="feature-list">
                <div class="feature-item">
                    <div class="feature-name">Tối ưu RAM</div>
                    <label class="switch">
                        <input type="checkbox" onchange="toggleFeature(this)">
                        <span class="slider"></span>
                    </label>
                </div>
                
                <div class="feature-item">
                    <div class="feature-name">Hỗ trợ kéo tâm</div>
                    <label class="switch">
                        <input type="checkbox" onchange="toggleFeature(this)">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="feature-item">
                    <div class="feature-name">
                        Unlock 120 FPS
                        <span class="info-btn" onclick="openPopup()">?</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" onchange="toggleFeature(this)">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="infoOverlay">
        <div class="popup-glass">
            <h3>Thông báo</h3>
            <p>Khi vào game tuy không hiện 120 FPS trong cài đặt, nhưng nếu thiết bị và trò chơi hỗ trợ thì trải nghiệm có thể mượt hơn sau khi tối ưu.</p>
            <button class="btn-close" onclick="closePopup()">Đã hiểu</button>
        </div>
    </div>

    <div class="toast" id="toastMsg">Key không hợp lệ</div>

    <script>
        // KIỂM TRA TRẠNG THÁI ĐĂNG NHẬP KHI MỞ TRANG
        window.onload = function() {
            const isLogged = localStorage.getItem('key premium login');
            if (isLogged === 'true') {
                document.getElementById('loginView').style.display = 'none';
                document.getElementById('panelView').style.display = 'block';
            } else {
                document.getElementById('loginView').style.display = 'block';
                document.getElementById('panelView').style.display = 'none';
            }
        };

        // HÀM XÁC THỰC KEY
        function verifyKey(e) {
            createRipple(e);
            const inputVal = document.getElementById('keyInput').value.trim();
            
            // Lấy danh sách key hợp lệ tạo từ admenu.html
            const validKeys = JSON.parse(localStorage.getItem('valid_ff_keys')) || [];

            if (validKeys.includes(inputVal)) {
                // Đăng nhập thành công
                showToast('Đăng nhập thành công!', 'success');
                localStorage.setItem('key premium login', 'true');
                
                // Hiệu ứng Loading mượt trước khi reload
                document.querySelector('#loginView .btn').innerText = "Đang tải...";
                setTimeout(() => {
                    location.reload();
                }, 800);
            } else {
                // Sai Key
                showToast('Key không hợp lệ', 'error');
            }
        }

        // BẬT / TẮT CHỨC NĂNG CÓ ANIMATION RUNG NHẸ
        function toggleFeature(checkbox) {
            const item = checkbox.closest('.feature-item');
            // Thêm hiệu ứng rung nhẹ khi gạt switch
            item.style.transform = "scale(0.98)";
            setTimeout(() => {
                item.style.transform = "scale(1)";
            }, 150);
        }

        // MỞ POPUP THÔNG BÁO 120FPS
        function openPopup() {
            document.getElementById('infoOverlay').classList.add('active');
        }

        // ĐÓNG POPUP MƯỢT MÀ
        function closePopup() {
            document.getElementById('infoOverlay').classList.remove('active');
        }

        // HIỆU ỨNG RIPPLE CHO NÚT (Click gợn sóng)
        function createRipple(event) {
            const button = event.currentTarget;
            const circle = document.createElement("span");
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - button.getBoundingClientRect().left - radius}px`;
            circle.style.top = `${event.clientY - button.getBoundingClientRect().top - radius}px`;
            circle.classList.add("ripple");
            const ripple = button.getElementsByClassName("ripple")[0];
            if (ripple) { ripple.remove(); }
            button.appendChild(circle);
        }

        // HIỂN THỊ TOAST (THÔNG BÁO TRƯỢT TỪ TRÊN XUỐNG)
        function showToast(msg, type = 'error') {
            const toast = document.getElementById('toastMsg');
            toast.innerText = msg;
            
            if(type === 'success') {
                toast.classList.add('success');
            } else {
                toast.classList.remove('success');
            }

            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
