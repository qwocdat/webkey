<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DAT Premium Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #000; --glass-bg: rgba(30, 30, 40, 0.45); --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #0A84FF; --text: #FFF; --subtext: #8E8E93;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1); /* iOS Spring */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; background-image: radial-gradient(circle at top right, rgba(10, 132, 255, 0.2), transparent 50%), radial-gradient(circle at bottom left, rgba(138, 43, 226, 0.2), transparent 50%); }
        
        /* Cấu trúc App */
        .app-container { width: 100%; max-width: 500px; margin: 0 auto; padding: max(20px, env(safe-area-inset-top)) 20px 40px; position: relative; }
        
        /* Glass chung */
        .glass { background: var(--glass-bg); backdrop-filter: saturate(180%) blur(25px); -webkit-backdrop-filter: saturate(180%) blur(25px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        /* MÀN HÌNH LOGIN */
        #loginView { display: none; text-align: center; margin-top: 30vh; animation: fadeUp 0.6s var(--spring); }
        .logo-login { width: 80px; height: 80px; background: linear-gradient(135deg, #0A84FF, #5E5CE6); border-radius: 22px; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; font-size: 30px; font-weight: bold; box-shadow: 0 10px 25px rgba(10, 132, 255, 0.4); }
        .input-key { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: #fff; padding: 18px 20px; border-radius: 18px; font-size: 16px; outline: none; margin-bottom: 20px; text-align: center; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .input-key:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(10, 132, 255, 0.3); }

        /* MÀN HÌNH PANEL */
        #panelView { display: none; animation: fadeUp 0.6s var(--spring); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .profile { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; background: url('https://api.dicebear.com/7.x/avataaars/svg?seed=DatVIP') center/cover; border: 2px solid var(--primary); }
        .info h1 { font-size: 18px; font-weight: 700; margin-bottom: 3px; }
        .info p { font-size: 12px; color: var(--primary); display: flex; align-items: center; gap: 5px; }
        .clock { text-align: right; }
        .clock #time { font-size: 20px; font-weight: bold; font-variant-numeric: tabular-nums; }
        .clock #date { font-size: 11px; color: var(--subtext); }

        /* Widget Hệ Thống */
        .widgets { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .widget { padding: 15px; border-radius: 20px; }
        .widget .title { font-size: 12px; color: var(--subtext); margin-bottom: 8px; font-weight: 600; }
        .widget .val { font-size: 16px; font-weight: 700; margin-bottom: 8px; font-variant-numeric: tabular-nums; }
        .progress-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .progress-bar { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

        /* Danh sách chức năng */
        .feature-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .feature-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; border-radius: 20px; }
        .f-name { font-size: 16px; font-weight: 500; }

        /* iOS Toggle Siêu Thực */
        .ios-toggle { position: relative; width: 52px; height: 32px; border-radius: 32px; background: rgba(255,255,255,0.15); cursor: pointer; transition: background 0.3s ease; box-shadow: inset 0 0 5px rgba(0,0,0,0.2); }
        .ios-toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 28px; height: 28px; background: #fff; border-radius: 50%; box-shadow: 0 3px 8px rgba(0,0,0,0.15), 0 1px 1px rgba(0,0,0,0.16); transition: transform 0.4s var(--spring); }
        .ios-toggle:active::after { width: 34px; } /* Đàn hồi khi giữ ngón tay */
        .ios-toggle.on { background: #30D158; }
        .ios-toggle.on::after { transform: translateX(20px); }
        .ios-toggle.on:active::after { transform: translateX(14px); } /* Kéo ngược nhẹ */

        /* Nút chung */
        .btn { width: 100%; padding: 18px; border: none; border-radius: 18px; font-size: 17px; font-weight: 700; color: #fff; cursor: pointer; transition: all 0.3s var(--spring); position: relative; overflow: hidden; }
        .btn-primary { background: linear-gradient(90deg, #0A84FF, #5E5CE6); box-shadow: 0 8px 20px rgba(10, 132, 255, 0.4); }
        .btn-primary:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(10, 132, 255, 0.3); }
        .btn-logout { background: transparent; border: 1px solid rgba(255,69,58,0.3); color: #FF453A; margin-top: 15px; padding: 12px; font-size: 15px; }

        /* Modal Kích Hoạt (Tiến trình) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.4s ease; z-index: 100; }
        .overlay.show { opacity: 1; pointer-events: auto; }
        .action-modal { background: rgba(20,20,30,0.85); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); width: 85%; max-width: 350px; border-radius: 28px; padding: 30px 25px; text-align: center; transform: scale(0.9); transition: 0.4s var(--spring); }
        .overlay.show .action-modal { transform: scale(1); }
        
        #actStatus { font-size: 16px; font-weight: 600; margin-bottom: 20px; min-height: 20px;}
        .big-progress { width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; margin-bottom: 15px; position: relative; }
        .big-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #0A84FF, #30D158); border-radius: 5px; transition: width 0.2s linear; }
        #actPercent { font-size: 24px; font-weight: bold; font-variant-numeric: tabular-nums; color: var(--primary); }

        #gameButtons { display: none; margin-top: 25px; gap: 10px; flex-direction: column; }
        .btn-game { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #fff; padding: 15px; border-radius: 16px; font-weight: bold; }

        /* Dynamic Island Toast */
        .toast { position: fixed; top: -60px; left: 50%; transform: translateX(-50%); background: #000; border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; padding: 10px 20px; font-size: 14px; font-weight: 500; z-index: 1000; transition: 0.5s var(--spring); display: flex; align-items: center; gap: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .toast.show { top: max(15px, env(safe-area-inset-top)); }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="loginView">
            <div class="logo-login">FF</div>
            <h2 style="margin-bottom: 10px;">Xác Thực Key</h2>
            <p style="color: var(--subtext); font-size: 14px; margin-bottom: 30px;">Vui lòng nhập Key để sử dụng Panel</p>
            <input type="text" id="keyInput" class="input-key" placeholder="DAT-XXXX-XXXX-XXXX" autocomplete="off">
            <button class="btn btn-primary" onclick="verifyKey()">ĐĂNG NHẬP</button>
        </div>

        <div id="panelView">
            <div class="glass header">
                <div class="profile">
                    <div class="avatar"></div>
                    <div class="info">
                        <h1>DAT FF Panel</h1>
                        <p>👑 Premium <span id="keyExpText" style="color:#E5E5EA;">Đang tải...</span></p>
                    </div>
                </div>
                <div class="clock">
                    <div id="time">00:00</div>
                    <div id="date">--/--/----</div>
                </div>
            </div>

            <div class="widgets">
                <div class="glass widget">
                    <div class="title">RAM SỬ DỤNG</div>
                    <div class="val" id="ramVal">0 / 8 GB</div>
                    <div class="progress-bg"><div class="progress-bar" id="ramBar" style="background:#FF9F0A;"></div></div>
                </div>
                <div class="glass widget">
                    <div class="title">MỨC CPU</div>
                    <div class="val" id="cpuVal">0%</div>
                    <div class="progress-bg"><div class="progress-bar" id="cpuBar" style="background:#0A84FF;"></div></div>
                </div>
                <div class="glass widget">
                    <div class="title">FPS</div>
                    <div class="val" style="color:#30D158;">120 FPS</div>
                </div>
                <div class="glass widget">
                    <div class="title">BỘ NHỚ</div>
                    <div class="val">128/256 GB</div>
                </div>
            </div>

            <div class="feature-list">
                <div class="glass feature-item">
                    <div class="f-name">Tối ưu bộ nhớ RAM</div>
                    <div class="ios-toggle" onclick="this.classList.toggle('on'); haptic()"></div>
                </div>
                <div class="glass feature-item">
                    <div class="f-name">Hỗ trợ kéo tâm</div>
                    <div class="ios-toggle" onclick="this.classList.toggle('on'); haptic()"></div>
                </div>
                <div class="glass feature-item">
                    <div class="f-name">Unlock 120 FPS</div>
                    <div class="ios-toggle" onclick="this.classList.toggle('on'); haptic()"></div>
                </div>
                <div class="glass feature-item">
                    <div class="f-name">Xóa Cache Game</div>
                    <div class="ios-toggle" onclick="this.classList.toggle('on'); haptic()"></div>
                </div>
            </div>

            <button class="btn btn-primary" onclick="startActivation()">KÍCH HOẠT</button>
            <button class="btn btn-logout" onclick="logout()">Đăng xuất</button>
        </div>
    </div>

    <div class="overlay" id="actModal">
        <div class="action-modal">
            <div id="actProcess">
                <div id="actStatus">Đang khởi tạo...</div>
                <div class="big-progress"><div class="big-bar" id="actBar"></div></div>
                <div id="actPercent">0%</div>
            </div>
            
            <div id="gameButtons">
                <p style="font-size:14px; color:#30D158; margin-bottom:10px;">✅ Đã sẵn sàng!</p>
                <button class="btn btn-game" onclick="openGame('com.dts.freefireth')">Mở Free Fire</button>
                <button class="btn btn-game" onclick="openGame('com.dts.freefiremax')">Mở Free Fire MAX</button>
                <button class="btn btn-logout" style="border:none; margin-top:5px;" onclick="closeModal()">Đóng</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Thông báo</div>

    <script>
        // Firebase Config
        const firebaseConfig = { apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE", databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "keyquocdat" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();

        // Device ID Generator
        function getDeviceId() {
            let id = localStorage.getItem('ff_device_id');
            if(!id) { id = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase(); localStorage.setItem('ff_device_id', id); }
            return id;
        }
        const deviceId = getDeviceId();
        let checkInterval;

        window.onload = () => {
            startClock(); startWidgets();
            const savedKey = localStorage.getItem('ff_saved_key');
            if(savedKey) { authenticate(savedKey, true); }
            else { showView('loginView'); }
        };

        function showView(id) {
            document.getElementById('loginView').style.display = id === 'loginView' ? 'block' : 'none';
            document.getElementById('panelView').style.display = id === 'panelView' ? 'block' : 'none';
        }

        function verifyKey() {
            const key = document.getElementById('keyInput').value.trim().toUpperCase();
            if(!key) return showToast('Vui lòng nhập Key!');
            authenticate(key, false);
        }

        function authenticate(key, isAutoLogin) {
            const btn = document.querySelector('#loginView .btn');
            if(!isAutoLogin) btn.innerText = "Đang kiểm tra...";

            db.ref('vip_ff_keys/' + key).once('value').then(snap => {
                if(!snap.exists()) {
                    if(isAutoLogin) logout(); else { showToast('Key không tồn tại!'); btn.innerText = "ĐĂNG NHẬP"; }
                    return;
                }

                const data = snap.val();
                const now = Date.now();

                // Check Expiration
                if(data.expiresAt !== "unlimited" && now > data.expiresAt) {
                    showToast('Key đã hết hạn!');
                    if(isAutoLogin) logout(); else btn.innerText = "ĐĂNG NHẬP";
                    return;
                }

                // Check Device Limit
                let devicesUsed = data.devicesUsed || {};
                let devCount = Object.keys(devicesUsed).length;
                
                if(!devicesUsed[deviceId]) {
                    if(data.maxDevices !== "unlimited" && devCount >= parseInt(data.maxDevices)) {
                        showToast('Key đã đạt giới hạn thiết bị!');
                        if(isAutoLogin) logout(); else btn.innerText = "ĐĂNG NHẬP";
                        return;
                    }
                    // Thêm thiết bị mới
                    devicesUsed[deviceId] = true;
                    db.ref(`vip_ff_keys/${key}/devicesUsed`).set(devicesUsed);
                    db.ref(`vip_ff_keys/${key}/activationsCount`).set((data.activationsCount || 0) + 1);
                }

                // Success
                localStorage.setItem('ff_saved_key', key);
                showToast('Đăng nhập thành công');
                showView('panelView');
                if(!isAutoLogin) btn.innerText = "ĐĂNG NHẬP";
                
                // Bắt đầu đếm ngược thời gian
                manageExpiration(data.expiresAt);

            }).catch(e => { showToast('Lỗi mạng!'); if(!isAutoLogin) btn.innerText = "ĐĂNG NHẬP"; });
        }

        function manageExpiration(expiresAt) {
            if(checkInterval) clearInterval(checkInterval);
            const textEl = document.getElementById('keyExpText');
            
            if(expiresAt === "unlimited") {
                textEl.innerText = "- Vĩnh viễn"; return;
            }

            const updateExp = () => {
                const now = Date.now();
                const diff = expiresAt - now;
                if(diff <= 0) {
                    clearInterval(checkInterval);
                    alert("Key của bạn đã hết hạn!"); logout();
                } else {
                    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                    const m = Math.floor((diff / 1000 / 60) % 60);
                    textEl.innerText = `- Còn ${d}d ${h}h ${m}m`;
                }
            };
            updateExp();
            checkInterval = setInterval(updateExp, 60000); // Cập nhật mỗi phút
        }

        function logout() {
            localStorage.removeItem('ff_saved_key');
            if(checkInterval) clearInterval(checkInterval);
            document.getElementById('keyInput').value = '';
            showView('loginView');
        }

        // Đồng hồ Realtime
        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('time').innerText = now.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                document.getElementById('date').innerText = now.toLocaleDateString('vi-VN');
            }, 1000);
        }

        // Giả lập Widget RAM/CPU
        function startWidgets() {
            setInterval(() => {
                let ram = (4.5 + Math.random() * 2).toFixed(1);
                let ramPct = (ram / 8) * 100;
                document.getElementById('ramVal').innerText = `${ram} / 8 GB`;
                document.getElementById('ramBar').style.width = `${ramPct}%`;

                let cpu = Math.floor(20 + Math.random() * 40);
                document.getElementById('cpuVal').innerText = `${cpu}%`;
                document.getElementById('cpuBar').style.width = `${cpu}%`;
            }, 2000);
        }

        // Tiến trình kích hoạt
        function startActivation() {
            haptic();
            const modal = document.getElementById('actModal');
            document.getElementById('actProcess').style.display = 'block';
            document.getElementById('gameButtons').style.display = 'none';
            modal.classList.add('show');
            
            let pct = 0;
            const bar = document.getElementById('actBar');
            const txt = document.getElementById('actStatus');
            const pctTxt = document.getElementById('actPercent');
            
            const steps = ["Đang kiểm tra thiết bị...", "Đang tải cấu hình...", "Đang áp dụng tối ưu...", "Đang hoàn tất..."];
            
            let sim = setInterval(() => {
                pct += Math.floor(Math.random() * 5) + 1;
                if(pct >= 100) {
                    pct = 100; clearInterval(sim);
                    setTimeout(() => {
                        document.getElementById('actProcess').style.display = 'none';
                        document.getElementById('gameButtons').style.display = 'flex';
                    }, 500);
                }
                bar.style.width = pct + '%';
                pctTxt.innerText = pct + '%';
                
                if(pct < 25) txt.innerText = steps[0];
                else if(pct < 50) txt.innerText = steps[1];
                else if(pct < 85) txt.innerText = steps[2];
                else txt.innerText = steps[3];
                
            }, 100);
        }

        function closeModal() { document.getElementById('actModal').classList.remove('show'); }

        // Mở game bằng Intent Android
        function openGame(pkg) {
            haptic();
            // Cú pháp Intent URL chuẩn trên Android
            const intentUrl = `intent://#Intent;package=${pkg};end`;
            
            // Cố gắng mở link, nếu trình duyệt không hiểu, fallback bằng setTimeout
            const now = Date.now();
            window.location.href = intentUrl;
            
            setTimeout(() => {
                if(Date.now() - now < 2000) {
                    showToast('Không tìm thấy Game hoặc thiết bị không hỗ trợ mở tự động.');
                }
            }, 1000);
        }

        // Tiện ích
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerHTML = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }
        function haptic() { if(navigator.vibrate) navigator.vibrate(50); }
    </script>
</body>
</html>
