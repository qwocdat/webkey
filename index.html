<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AppHub - Kho Ứng Dụng</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --bg: #000000; --surface: rgba(20, 0, 0, 0.65); --border: rgba(255, 59, 48, 0.3); --text: #fff; --radius: 24px; --primary: #ff3b30; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; padding: 16px; }
    
    .container { max-width: 500px; width: 100%; animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    
    .glass { background: var(--surface); backdrop-filter: blur(24px); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; box-shadow: 0 8px 32px rgba(255, 0, 0, 0.15); }
    .intro-banner { background: linear-gradient(135deg, rgba(255, 59, 48, 0.15) 0%, rgba(20, 0, 0, 0.5) 100%); border: 1px solid rgba(255, 59, 48, 0.2); border-radius: 20px; padding: 18px; margin-bottom: 16px; }
    .btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 12px 20px; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 8px; text-align: center; text-decoration: none; display: inline-block; }
    .btn-primary { background: var(--primary); color: white; border: none; box-shadow: 0 0 15px rgba(255, 59, 48, 0.4); }
    .btn-primary:hover { background: #ff453a; box-shadow: 0 0 25px rgba(255, 59, 48, 0.6); }
    .btn:active:not(:disabled) { transform: scale(0.96); }
    .btn:disabled { cursor: not-allowed; opacity: 0.7; }
    
    input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 14px; color: white; width: 100%; margin-bottom: 10px; outline: none; transition: 0.3s; }
    input:focus { border-color: var(--primary); background: rgba(255, 59, 48, 0.05); box-shadow: 0 0 10px rgba(255, 59, 48, 0.4); }
    .app-card { display: flex; align-items: center; gap: 14px; padding: 14px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 59, 48, 0.15); border-radius: 18px; margin-bottom: 12px; cursor: pointer; transition: 0.3s; }
    .app-card:hover { background: rgba(255, 59, 48, 0.1); transform: translateY(-2px); border-color: rgba(255, 59, 48, 0.4); }
    .app-icon { width: 56px; height: 56px; border-radius: 14px; object-fit: cover; border: 1px solid rgba(255,59,48,0.2); }
    .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    
    .hidden { display: none !important; } .flex { display: flex; } .flex-col { flex-direction: column; } .items-center { align-items: center; } .justify-between { justify-content: space-between; } .gap-2 { gap: 8px; } .mt-4 { margin-top: 16px; } .text-secondary { color: rgba(255,255,255,0.6); font-size: 13px; } .text-center { text-align: center; }
    
    .tag { font-size: 10px; padding: 3px 6px; border-radius: 6px; font-weight: bold; margin-bottom: 4px; display: inline-block;}
    .tag-vip { background: linear-gradient(45deg, #ffc107, #ff9800); color: black; box-shadow: 0 0 10px rgba(255, 193, 7, 0.5); }
    .tag-free { background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid rgba(255,255,255,0.2); }
    .tag-soon { background: linear-gradient(45deg, #007aff, #00d4ff); color: white; box-shadow: 0 0 10px rgba(0, 122, 255, 0.5); }

    @keyframes blinkDot { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes blinkDotSlow { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
    
    .app-status { font-size: 11px; padding: 4px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    
    .status-online { background: rgba(0, 255, 0, 0.1); color: #00ff00; border: 1px solid rgba(0, 255, 0, 0.3); }
    .status-online .status-dot { background: #00ff00; box-shadow: 0 0 8px #00ff00; animation: blinkDot 1s infinite; }
    
    .status-offline { background: rgba(255, 59, 48, 0.1); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.3); }
    .status-offline .status-dot { background: #ff3b30; box-shadow: 0 0 5px #ff3b30; }

    .status-soon { background: rgba(0, 122, 255, 0.1); color: #00d4ff; border: 1px solid rgba(0, 122, 255, 0.3); }
    .status-soon .status-dot { background: #00d4ff; box-shadow: 0 0 8px #00d4ff; animation: blinkDotSlow 2s infinite; }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <template id="main-template">
    <div class="glass flex items-center justify-between" style="flex-wrap: wrap; gap: 10px;">
      <div style="flex-grow: 1;">
        <h3 style="font-weight:700; font-size:18px; text-shadow: 0 0 10px rgba(255,59,48,0.5);">📱 AppHub Store</h3>
        <p id="user-status-text" class="text-secondary" style="font-size:11px; margin-top:4px;">Chế độ khách</p>
      </div>
      <div class="flex gap-1" style="flex-wrap: wrap;">
        <a href="indexv2.html" class="btn" style="width:auto; padding:8px 12px; margin:0; font-size:13px; border-color: #00d4ff; color: #00d4ff;">✨ Giao diện V2</a>
        
        <button class="btn hidden" style="width:auto; padding:8px 12px; margin:0; font-size:13px; border-color: #ff3b30; color: #ff3b30;" id="cancel-vip-action-btn">❌ Hủy VIP</button>
        <button class="btn hidden" style="width:auto; padding:8px 12px; margin:0; font-size:13px; border-color: #ffc107; color: #ffc107;" id="vip-action-btn">👑 Nâng VIP</button>
        <button class="btn" style="width:auto; padding:8px 16px; margin:0; font-size:13px; border-color: rgba(255,59,48,0.4);" id="auth-action-btn">Đăng nhập</button>
      </div>
    </div>

    <div class="intro-banner">
      <h4 style="font-weight:600; font-size:15px; margin-bottom:4px; color: #ff3b30;">✨ Chào mừng bạn đến với AppHub</h4>
      <p class="text-secondary" style="font-size:13px; line-height:1.4;">Tải ứng dụng miễn phí, hoặc vượt link để nhận thẻ VIP (Có 1 lượt tải VIP & Hạn sử dụng trong 24 giờ).</p>
    </div>

    <div id="app-list"></div>
  </template>

  <template id="app-detail-template">
    <div class="glass" style="animation: fadeIn 0.2s ease-out;">
      <button class="btn" style="width:auto; margin:0; padding:6px 12px; font-size:13px; border-color: rgba(255,59,48,0.3);" id="back-btn">← Quay lại cửa hàng</button>
      
      <div class="flex flex-col items-center gap-2 mt-4 text-center">
        <div id="detail-tag"></div>
        <img id="detail-icon" class="app-icon" style="width:120px; height:120px; border-radius:24px; box-shadow:0 0 30px rgba(255,59,48,0.5); border: 2px solid #ff3b30; margin-top: 10px;">
        
        <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top:12px; flex-wrap: wrap;">
          <h2 id="detail-name" style="font-weight:800; font-size:26px; text-shadow: 0 0 10px rgba(255,255,255,0.3); margin: 0;"></h2>
          <div id="detail-status" class="app-status">
            <div class="status-dot"></div> <span id="status-text">...</span>
          </div>
        </div>
        
        <div class="flex gap-2 text-secondary" style="margin-bottom:12px; font-size: 14px;">
          <span id="detail-version"></span> • <span id="detail-size"></span> • <span id="detail-downloads"></span>
        </div>
        
        <div style="background:rgba(0,0,0,0.3); border:1px solid rgba(255,59,48,0.2); padding:16px; border-radius:14px; width:100%; text-align:left; margin-bottom:15px;">
          <p id="detail-desc" style="font-size:15px; line-height:1.6; color:rgba(255,255,255,0.85); white-space:pre-line;"></p>
        </div>
        
        <button id="download-trigger-btn" class="btn btn-primary" style="font-size:16px; padding: 14px;">📥 Tải xuống ngay</button>
      </div>
    </div>
  </template>

  <div id="auth-modal" class="modal-overlay hidden">
    <div class="glass" style="width:100%; max-width:380px; margin:0; position:relative; border-color: #ff3b30; box-shadow: 0 0 40px rgba(255,0,0,0.3);">
      <button id="close-auth-btn" style="position:absolute; top:16px; right:16px; background:none; border:none; color:white; font-size:18px; cursor:pointer;">✕</button>
      <div id="login-form">
        <h3 style="font-weight:700; margin-bottom:4px;">Đăng nhập</h3>
        <p class="text-secondary" style="margin-bottom:16px;">Đăng nhập để tải app và nhận Key VIP.</p>
        <input type="email" id="email-login" placeholder="Email">
        <input type="password" id="password-login" placeholder="Mật khẩu">
        <button class="btn btn-primary" id="login-btn">Đăng nhập</button>
        <p class="text-secondary text-center mt-4" style="cursor:pointer;" id="go-register">Chưa có tài khoản? <b style="color:#ff3b30;">Đăng ký</b></p>
      </div>
      <div id="register-form" class="hidden">
        <h3 style="font-weight:700; margin-bottom:4px;">Đăng ký</h3>
        <input type="email" id="email-reg" placeholder="Email">
        <input type="password" id="password-reg" placeholder="Mật khẩu">
        <button class="btn btn-primary" id="register-btn">Đăng ký</button>
        <p class="text-secondary text-center mt-4" style="cursor:pointer;" id="go-login">Đã có tài khoản? <b style="color:#ff3b30;">Đăng nhập</b></p>
      </div>
    </div>
  </div>

  <div id="vip-modal" class="modal-overlay hidden">
    <div class="glass" style="width:100%; max-width:380px; margin:0; position:relative; border-color: #ffc107; box-shadow: 0 0 40px rgba(255,193,7,0.3);">
      <button id="close-vip-btn" style="position:absolute; top:16px; right:16px; background:none; border:none; color:white; font-size:18px; cursor:pointer;">✕</button>
      <h3 style="font-weight:700; margin-bottom:4px; color:#ffc107; text-shadow: 0 0 10px rgba(255,193,7,0.5);">👑 Nâng cấp VIP</h3>
      <p class="text-secondary" style="margin-bottom:16px;">Đi tới trang lấy mã để nhận <b style="color:white;">1 lượt tải VIP</b> (HSD: 24 Giờ).</p>
      <a href="get-vip.html" target="_blank" class="btn" style="background: rgba(255,193,7,0.1); border-color:#ffc107; color:#ffc107; margin-bottom:15px;">🔗 Đi tới trang lấy Mã</a>
      <input type="text" id="vip-code-input" placeholder="Nhập mã (vd: vipuseractive-...)" style="border-color:#ffc107;">
      <button class="btn btn-primary" style="background:#ffc107; color:black; box-shadow: 0 0 15px rgba(255,193,7,0.4);" id="verify-vip-btn">✅ Xác nhận Mã</button>
    </div>
  </div>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE", databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "keyquocdat" };
    firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.database();
    
    const appEl = document.getElementById('app'); 
    let currentUser = null; let currentUserData = null; let vipTimerInterval = null;

    function render(templateId) {
      appEl.innerHTML = ''; appEl.appendChild(document.getElementById(templateId).content.cloneNode(true));
      if (templateId === 'main-template') initMain(); else if (templateId === 'app-detail-template') window._appDetailInit();
    }

    document.getElementById('close-auth-btn').addEventListener('click', () => document.getElementById('auth-modal').classList.add('hidden'));
    document.getElementById('go-register').addEventListener('click', () => { document.getElementById('login-form').classList.add('hidden'); document.getElementById('register-form').classList.remove('hidden'); });
    document.getElementById('go-login').addEventListener('click', () => { document.getElementById('register-form').classList.add('hidden'); document.getElementById('login-form').classList.remove('hidden'); });
    
    document.getElementById('login-btn').addEventListener('click', () => {
      auth.signInWithEmailAndPassword(document.getElementById('email-login').value, document.getElementById('password-login').value)
        .then(() => document.getElementById('auth-modal').classList.add('hidden')).catch(e => alert('Sai thông tin đăng nhập!'));
    });
    
    document.getElementById('register-btn').addEventListener('click', () => {
      auth.createUserWithEmailAndPassword(document.getElementById('email-reg').value, document.getElementById('password-reg').value)
        .then(cred => {
          db.ref('users/' + cred.user.uid).set({ email: cred.user.email, isVip: false });
          document.getElementById('auth-modal').classList.add('hidden');
        }).catch(e => alert('Lỗi đăng ký: Email đã tồn tại hoặc mật khẩu quá yếu (cần 6 ký tự).'));
    });

    document.getElementById('close-vip-btn').addEventListener('click', () => document.getElementById('vip-modal').classList.add('hidden'));
    document.getElementById('verify-vip-btn').addEventListener('click', () => {
      const code = document.getElementById('vip-code-input').value.trim();
      if(!code) return alert('Vui lòng nhập mã!');
      if(!currentUser) return alert('Bạn cần đăng nhập trước!');
      
      const btn = document.getElementById('verify-vip-btn'); btn.textContent = '⏳ Đang kiểm tra...'; btn.disabled = true;

      db.ref('vip_codes/' + code).once('value', snap => {
        if(snap.exists() && snap.val().valid === true) {
          db.ref('vip_codes/' + code).update({ valid: false });
          const expiresAt = Date.now() + (24 * 60 * 60 * 1000); 
          db.ref('users/' + currentUser.uid).update({ isVip: true, vipDownloadsLeft: 1, vipExpiresAt: expiresAt }).then(() => {
            alert('🎉 Kích hoạt VIP thành công! Bạn có 1 Lượt tải VIP và hạn sử dụng trong vòng 24 Giờ.');
            document.getElementById('vip-modal').classList.add('hidden');
          });
        } else { alert('❌ Mã kích hoạt không hợp lệ hoặc đã được sử dụng!'); }
        btn.textContent = '✅ Xác nhận Mã'; btn.disabled = false;
      });
    });

    auth.onAuthStateChanged(user => {
      currentUser = user;
      if (user) { db.ref('users/' + user.uid).on('value', snap => { currentUserData = snap.val(); updateHeaderUI(); }); } 
      else { currentUserData = null; updateHeaderUI(); }
    });

    function updateHeaderUI() {
      const statusText = document.getElementById('user-status-text');
      const authBtn = document.getElementById('auth-action-btn');
      const vipBtn = document.getElementById('vip-action-btn');
      const cancelVipBtn = document.getElementById('cancel-vip-action-btn');
      
      if (!statusText) return;
      if (vipTimerInterval) clearInterval(vipTimerInterval);

      if (currentUser) {
        if (currentUserData && currentUserData.isVip) {
            const now = Date.now(); const expiresAt = currentUserData.vipExpiresAt || 0; const left = currentUserData.vipDownloadsLeft || 0;
            if (left <= 0 || now > expiresAt) {
                db.ref('users/' + currentUser.uid).update({ isVip: false, vipDownloadsLeft: 0, vipExpiresAt: null });
                return;
            }
            vipBtn.classList.add('hidden'); cancelVipBtn.classList.remove('hidden');

            const tickTimer = () => {
                const currentNow = Date.now(); const diff = expiresAt - currentNow;
                if (diff <= 0) {
                    clearInterval(vipTimerInterval); db.ref('users/' + currentUser.uid).update({ isVip: false, vipDownloadsLeft: 0, vipExpiresAt: null });
                } else {
                    const h = Math.floor(diff / (1000 * 60 * 60)).toString().padStart(2, '0');
                    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                    const s = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
                    statusText.innerHTML = `<span style="color:#ffc107; font-weight: bold;">👑 VIP (Còn ${left} lượt) - Hết hạn: ${h}:${m}:${s}</span>`;
                }
            };
            tickTimer(); vipTimerInterval = setInterval(tickTimer, 1000); authBtn.textContent = 'Đăng xuất';
        } else {
            statusText.textContent = `Tài khoản: ${currentUser.email}`;
            vipBtn.classList.remove('hidden'); cancelVipBtn.classList.add('hidden'); authBtn.textContent = 'Đăng xuất';
        }
      } else {
        statusText.textContent = 'Chế độ khách'; authBtn.textContent = 'Đăng nhập';
        vipBtn.classList.add('hidden'); cancelVipBtn.classList.add('hidden');
      }
    }

    function initMain() {
      updateHeaderUI();
      document.getElementById('auth-action-btn').addEventListener('click', () => {
        if (currentUser) auth.signOut().then(() => alert('Đã đăng xuất!'));
        else document.getElementById('auth-modal').classList.remove('hidden');
      });

      document.getElementById('vip-action-btn').addEventListener('click', () => document.getElementById('vip-modal').classList.remove('hidden'));

      const cancelBtn = document.getElementById('cancel-vip-action-btn');
      if(cancelBtn) {
        cancelBtn.addEventListener('click', () => {
            if(confirm('Bạn có chắc chắn muốn hủy gói VIP hiện tại không? Lượt tải sẽ bị mất!')) {
                db.ref('users/' + currentUser.uid).update({ isVip: false, vipDownloadsLeft: 0, vipExpiresAt: null });
                alert('Đã hủy gói VIP thành công.');
            }
        });
      }

      const listEl = document.getElementById('app-list');
      db.ref('apps').on('value', snap => {
        const apps = snap.val() || {}; listEl.innerHTML = '';
        Object.entries(apps).forEach(([id, app]) => {
          let tagHtml = '';
          if (app.type === 'vip') tagHtml = '<span class="tag tag-vip">👑 VIP</span>';
          else if (app.type === 'coming_soon') tagHtml = '<span class="tag tag-soon">⏳ SẮP RA MẮT</span>';
          else tagHtml = '<span class="tag tag-free">Miễn phí</span>';

          const card = document.createElement('div'); card.className = 'app-card';
          card.innerHTML = `
            <img class="app-icon" src="${app.icon}">
            <div style="flex:1; min-width: 0;">${tagHtml}<p style="font-weight:600; font-size:15px; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;">${app.name}</p></div>
            <span style="font-size:18px; color:#ff3b30; font-weight:700;">→</span>
          `;
          card.addEventListener('click', () => { window._appDetail = { id, ...app }; render('app-detail-template'); });
          listEl.appendChild(card);
        });
      });
    }

    window._appDetailInit = function() {
      const app = window._appDetail;
      document.getElementById('back-btn').addEventListener('click', () => render('main-template'));
      
      document.getElementById('detail-icon').src = app.icon;
      document.getElementById('detail-name').textContent = app.name;
      document.getElementById('detail-version').textContent = app.version || '1.0.0';
      document.getElementById('detail-size').textContent = app.size || 'N/A';
      document.getElementById('detail-downloads').textContent = `📥 ${app.downloads || 0}`;
      document.getElementById('detail-desc').textContent = app.description || 'Chưa có thông tin.';
      
      let detailTag = '';
      if (app.type === 'vip') detailTag = '<span class="tag tag-vip">👑 Yêu Cầu Tài Khoản VIP</span>';
      else if (app.type === 'coming_soon') detailTag = '<span class="tag tag-soon">⏳ Sản Phẩm Sắp Ra Mắt</span>';
      else detailTag = '<span class="tag tag-free">Ứng Dụng Miễn Phí</span>';
      document.getElementById('detail-tag').innerHTML = detailTag;

      const dlBtn = document.getElementById('download-trigger-btn'); const statusBox = document.getElementById('detail-status'); const statusText = document.getElementById('status-text');

      if (app.type === 'coming_soon') {
        statusBox.className = 'app-status status-soon'; statusText.textContent = 'Đang phát triển';
        dlBtn.disabled = true; dlBtn.textContent = '⏳ Đang hoàn thiện...';
        dlBtn.style.background = 'rgba(0, 122, 255, 0.1)'; dlBtn.style.color = '#00d4ff'; dlBtn.style.boxShadow = 'none'; dlBtn.style.borderColor = 'rgba(0, 122, 255, 0.3)'; dlBtn.style.borderWidth = '1px'; dlBtn.style.borderStyle = 'solid';
      }
      else if (app.downloadLink && app.downloadLink.trim() !== '' && app.downloadLink.trim() !== '#') {
        statusBox.className = 'app-status status-online'; statusText.textContent = 'Hoạt động';
        dlBtn.disabled = false; dlBtn.textContent = '📥 Tải xuống ngay';
        dlBtn.style.background = 'var(--primary)'; dlBtn.style.color = 'white'; dlBtn.style.boxShadow = '0 0 15px rgba(255, 59, 48, 0.4)'; dlBtn.style.border = 'none';
      } 
      else {
        statusBox.className = 'app-status status-offline'; statusText.textContent = 'Offline';
        dlBtn.disabled = true; dlBtn.textContent = '🚫 Ứng dụng đang bảo trì';
        dlBtn.style.background = 'rgba(255,255,255,0.1)'; dlBtn.style.color = 'rgba(255,255,255,0.5)'; dlBtn.style.boxShadow = 'none'; dlBtn.style.border = 'none';
      }
      
      dlBtn.addEventListener('click', () => {
        if (dlBtn.disabled) return;
        if (!currentUser) { alert('🔒 Bạn cần đăng nhập để tải ứng dụng!'); document.getElementById('auth-modal').classList.remove('hidden'); return; }

        if (app.type === 'vip') {
            if (!currentUserData || !currentUserData.isVip || currentUserData.vipDownloadsLeft <= 0) { 
                alert('👑 Đây là ứng dụng VIP. Bạn đã hết lượt tải hoặc chưa kích hoạt, vui lòng lấy Mã mới!'); 
                document.getElementById('vip-modal').classList.remove('hidden'); return; 
            }
            db.ref('users/' + currentUser.uid).update({ vipDownloadsLeft: currentUserData.vipDownloadsLeft - 1 });
            alert('Bạn đã sử dụng 1 lượt tải VIP thành công!');
        }
        window.location.href = 'down.html?id=' + app.id;
      });
    };

    render('main-template'); db.ref('stats/pageViews').transaction(currentViews => (currentViews || 0) + 1);
  </script>
</body>
</html>
