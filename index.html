<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tối ưu panel · quocdat</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 30%, #f0eaff, #d9c9ff);
            /* lưới màn hình kiểu hacker nhẹ */
            background-image: 
                repeating-linear-gradient(0deg, rgba(138, 43, 226, 0.03) 0px, rgba(138, 43, 226, 0.03) 2px, transparent 2px, transparent 8px),
                radial-gradient(circle at 30% 30%, #f0eaff, #d9c9ff);
            padding: 16px;
            position: relative;
        }

        /* hiệu ứng chữ glitch cho tên hacker */
        @keyframes glitch {
            0% { text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9; }
            20% { text-shadow: -2px 0 #ff00c1, 2px 0 #00fff9; }
            40% { text-shadow: 2px 0 #00fff9, -2px 0 #ff00c1; }
            60% { text-shadow: -2px 0 #00fff9, 2px 0 #ff00c1; }
            80% { text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9; }
            100% { text-shadow: -2px 0 #ff00c1, 2px 0 #00fff9; }
        }

        /* hiệu ứng fade + scale khi vào app */
        @keyframes appear {
            0% { opacity: 0; transform: scale(0.96) translateY(20px); backdrop-filter: blur(0px); }
            100% { opacity: 1; transform: scale(1) translateY(0); backdrop-filter: blur(16px); }
        }

        .app {
            width: 100%;
            max-width: 720px;
            animation: appear 0.6s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
        }

        /* panel chính – kính mờ iOS + tím sáng */
        .panel {
            background: rgba(255, 245, 255, 0.65);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1.5px solid rgba(180, 130, 255, 0.35);
            border-radius: 42px;
            box-shadow: 0 20px 40px rgba(105, 50, 180, 0.25), 0 8px 20px rgba(0, 0, 0, 0.1), inset 0 1px 2px rgba(255, 255, 255, 0.8);
            padding: 32px 28px;
            color: #2d1b4e;
        }

        /* header kiểu terminal nhẹ */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px dashed #a07ae0;
            padding-bottom: 18px;
        }
        .header i {
            font-size: 28px;
            color: #7d3acb;
            filter: drop-shadow(0 2px 4px #d3b5ff);
        }
        .header h1 {
            font-weight: 590;
            font-size: 2rem;
            letter-spacing: -0.5px;
            background: linear-gradient(130deg, #481f77, #b46ef3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 5px rgba(170, 120, 255, 0.3);
        }
        .header .prompt {
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            color: #a33df0;
            font-size: 1rem;
            margin-left: auto;
            background: rgba(200, 165, 255, 0.25);
            padding: 6px 14px;
            border-radius: 60px;
            border: 1px solid #c7a2ff;
            backdrop-filter: blur(4px);
            box-shadow: inset 0 1px 3px white;
        }
        .header .prompt i {
            font-size: 12px;
            margin-right: 6px;
            color: #5e2a9c;
        }

        /* 3 chức năng tối ưu */
        .optimize-grid {
            display: flex;
            gap: 18px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .opt-card {
            flex: 1 1 140px;
            background: rgba(255, 240, 255, 0.55);
            backdrop-filter: blur(8px);
            border: 1.5px solid rgba(190, 130, 250, 0.5);
            border-radius: 32px;
            padding: 22px 8px 18px;
            text-align: center;
            transition: all 0.2s ease;
            box-shadow: 0 6px 12px rgba(151, 96, 239, 0.15);
            cursor: pointer;
            color: #2f195f;
            position: relative;
            overflow: hidden;
        }
        .opt-card:hover {
            transform: translateY(-4px);
            border-color: #b27afe;
            background: rgba(255, 250, 255, 0.8);
            box-shadow: 0 14px 22px rgba(139, 80, 255, 0.3);
        }
        .opt-card i {
            font-size: 42px;
            background: linear-gradient(145deg, #9b4dff, #c56fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 6px #e2c4ff);
        }
        .opt-card h3 {
            font-weight: 550;
            font-size: 1.2rem;
            margin-bottom: 6px;
            letter-spacing: -0.2px;
        }
        .opt-card p {
            font-size: 0.75rem;
            font-family: 'Menlo', monospace;
            opacity: 0.8;
            color: #6230a2;
            text-transform: uppercase;
        }

        /* Bảng chương trình kiểu macOS (dock thu nhỏ) */
        .program-section {
            background: rgba(250, 240, 255, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 22px 24px;
            margin-bottom: 40px;
            border: 1px solid rgba(205, 155, 255, 0.5);
            box-shadow: inset 0 1px 5px rgba(255, 255, 255, 0.7), 0 10px 15px -6px #bba4e0;
        }
        .program-label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .program-label span {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6b3cb0;
            background: rgba(200, 175, 255, 0.4);
            padding: 4px 14px;
            border-radius: 30px;
            border: 0.6px solid #ad85e6;
        }
        .program-label i {
            color: #7d3fe0;
            font-size: 20px;
        }
        .mac-dock {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
            gap: 15px 5px;
        }
        .dock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 10px 8px;
            min-width: 70px;
            border-radius: 24px;
            background: transparent;
            transition: 0.2s;
            cursor: default;
            border: 1px solid transparent;
        }
        .dock-item:hover {
            background: rgba(255, 255, 255, 0.5);
            border-color: #dabcff;
            backdrop-filter: blur(4px);
            transform: scale(1.05);
        }
        .dock-item i {
            font-size: 32px;
            color: #3f1d74;
            text-shadow: 0 4px 8px #e0c5ff;
        }
        .dock-item span {
            font-size: 0.7rem;
            font-weight: 500;
            color: #2b104b;
            background: rgba(255, 255, 255, 0.5);
            padding: 2px 10px;
            border-radius: 30px;
        }

        /* footer thông tin tác giả + zalo */
        .footer {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dotted #bc9aff;
        }
        .owner {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .owner .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b27cf0, #7a4fd0);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.4rem;
            box-shadow: 0 6px 14px #c7abff;
        }
        .owner .info h4 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #2b0652;
            animation: glitch 3s infinite step-start 1s;
        }
        .owner .info p {
            font-size: 0.9rem;
            color: #4a2b77;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.6);
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid #bba2f0;
            backdrop-filter: blur(2px);
        }
        .zalo {
            background: rgba(235, 220, 255, 0.7);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 60px;
            border: 1.5px solid #b57aed;
            font-weight: 560;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px #deb8ff;
            transition: 0.2s;
        }
        .zalo i {
            font-size: 28px;
            color: #6a39b3;
        }
        .zalo a {
            text-decoration: none;
            color: #310b62;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.5);
            padding: 5px 18px;
            border-radius: 60px;
            border: 1px solid white;
        }
        .zalo a:hover {
            background: white;
            color: #6a39b3;
        }

        /* hiệu ứng ripple khi bấm */
        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 150, 255, 0.6) 0%, rgba(180, 130, 255, 0.2) 80%);
            transform: scale(0);
            animation: ripple 0.5s linear;
            pointer-events: none;
        }
        @keyframes ripple {
            to { transform: scale(6); opacity: 0; }
        }

        /* media query nhỏ */
        @media (max-width: 550px) {
            .panel { padding: 20px; }
            .footer { flex-direction: column; align-items: flex-start; gap: 15px; }
            .zalo { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="panel">

            <!-- header: hacker + tên tác giả xuất hiện ở góc -->
            <div class="header">
                <i class="fa-solid fa-terminal" style="background: linear-gradient(145deg,#8a4bf3,#c48aff); -webkit-background-clip:text; background-clip:text; color:transparent;"></i>
                <h1>opt panel</h1>
                <div class="prompt">
                    <i class="fa-regular fa-circle"></i> quocdat@hackintosh ~ %
                </div>
            </div>

            <!-- 3 chức năng tối ưu máy (click có ripple) -->
            <div class="optimize-grid">
                <div class="opt-card" id="opt1">
                    <i class="fa-solid fa-broom"></i>
                    <h3>Dọn rác</h3>
                    <p>disk cleanup</p>
                </div>
                <div class="opt-card" id="opt2">
                    <i class="fa-solid fa-gauge-high"></i>
                    <h3>Tăng tốc</h3>
                    <p>memory boost</p>
                </div>
                <div class="opt-card" id="opt3">
                    <i class="fa-solid fa-rocket"></i>
                    <h3>Khởi động</h3>
                    <p>startup optimizer</p>
                </div>
            </div>

            <!-- Bảng chương trình kiểu macOS (dock style) -->
            <div class="program-section">
                <div class="program-label">
                    <i class="fa-brands fa-apple"></i>
                    <span>chương trình</span>
                    <i class="fa-regular fa-square" style="margin-left:auto; opacity:0.5;"></i>
                </div>
                <div class="mac-dock">
                    <div class="dock-item">
                        <i class="fa-solid fa-folder-open"></i>
                        <span>Finder</span>
                    </div>
                    <div class="dock-item">
                        <i class="fa-solid fa-terminal"></i>
                        <span>Terminal</span>
                    </div>
                    <div class="dock-item">
                        <i class="fa-solid fa-chart-simple"></i>
                        <span>Activity</span>
                    </div>
                    <div class="dock-item">
                        <i class="fa-solid fa-trash-can"></i>
                        <span>Trash</span>
                    </div>
                    <div class="dock-item">
                        <i class="fa-solid fa-gear"></i>
                        <span>Settings</span>
                    </div>
                </div>
                <!-- dòng trạng thái giống mac (hacker) -->
                <div style="display:flex; justify-content:flex-end; margin-top:12px; font-size:0.7rem; font-family:monospace; color:#794bb5;">
                    <span>>_ 9 processes running</span>
                </div>
            </div>

            <!-- Footer: giới thiệu tác giả và zalo -->
            <div class="footer">
                <div class="owner">
                    <div class="avatar">Q</div>
                    <div class="info">
                        <h4>quocdat</h4>
                        <p><i class="fa-regular fa-id-card"></i> Owner · dev</p>
                    </div>
                </div>
                <div class="zalo">
                    <i class="fa-solid fa-phone"></i>
                    <a href="#">0989249990</a>
                    <i class="fa-regular fa-message" style="color:#a16cf4;"></i>
                </div>
            </div>

            <!-- dòng chữ nhỏ kiểu hacker (ẩn hiệu ứng) -->
            <div style="text-align:center; margin-top: 18px; font-size:0.7rem; color:#ba9cf0; font-family: monospace; letter-spacing:2px;">
                <i class="fa-regular fa-keyboard"></i> --==[ init system v.9.2 ]==-- 
                <span style="background:#c7adff20; padding:3px 8px; border-radius: 30px; margin-left: 6px;">#tối ưu</span>
            </div>
        </div>
    </div>

    <!-- hiệu ứng bấm ripple (JavaScript) -->
    <script>
        (function() {
            // tạo hiệu ứng gợn sóng khi click vào các thẻ .opt-card
            const cards = document.querySelectorAll('.opt-card');
            cards.forEach(card => {
                card.addEventListener('click', function(e) {
                    // tạo phần tử ripple
                    const ripple = document.createElement('span');
                    ripple.classList.add('ripple-effect');
                    
                    // vị trí click trong card
                    const rect = card.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);
                    ripple.style.width = ripple.style.height = size + 'px';
                    ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
                    ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
                    
                    // style để ripple nằm trong card
                    ripple.style.position = 'absolute';
                    ripple.style.backgroundColor = 'transparent'; // màu đã xử lý qua radial-gradient trong class
                    
                    // đảm bảo card có position relative (đã có sẵn .opt-card {position: relative} )
                    card.appendChild(ripple);
                    
                    // xóa ripple sau khi animation kết thúc
                    setTimeout(() => {
                        ripple.remove();
                    }, 500);
                });
            });

            // thêm hiệu ứng riêng cho các dock-item (không bắt buộc nhưng vui)
            const dockItems = document.querySelectorAll('.dock-item');
            dockItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    const ripple = document.createElement('span');
                    ripple.classList.add('ripple-effect');
                    const rect = item.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);
                    ripple.style.width = ripple.style.height = size + 'px';
                    ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
                    ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
                    ripple.style.position = 'absolute';
                    // item mặc định không relative, cần set relative
                    item.style.position = 'relative';
                    item.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 500);
                });
            });
        })();
    </script>

    <!-- thêm style động cho ripple (đã có class nhưng đảm bảo) -->
    <style>
        /* đảm bảo card có relative */
        .opt-card, .dock-item {
            position: relative;
            overflow: hidden;
        }
        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(230, 200, 255, 0.7) 0%, rgba(180, 130, 255, 0.2) 80%);
            transform: scale(0);
            animation: ripple 0.5s ease-out;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes ripple {
            0% { transform: scale(0); opacity: 0.6; }
            100% { transform: scale(5); opacity: 0; }
        }
        /* tối ưu hiển thị số zalo */
        .zalo a {
            transition: 0.2s;
        }
        .zalo a:hover {
            background: #f0e4ff;
            transform: scale(1.02);
        }
        /* hiệu ứng bổ sung cho tên quocdat */
        .owner .info h4:hover {
            animation: glitch 0.6s infinite;
        }
    </style>
</body>
</html>
