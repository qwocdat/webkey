<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AppHub - Tải ứng dụng</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #0a0a0a;
      --surface: rgba(28,28,30,0.65);
      --border: rgba(255,255,255,0.08);
      --text: #fff;
      --radius: 28px;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }
    .container { max-width: 480px; width: 100%; }
    .glass {
      background: var(--surface);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 14px 20px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      margin-top: 8px;
      text-align: center;
    }
    .btn-primary { background: white; color: black; border: none; }
    .btn:active { transform: scale(0.96); }
    input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 14px;
      color: white;
      width: 100%;
      margin-bottom: 8px;
      outline: none;
    }
    .app-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(255,255,255,0.02);
      border-radius: 20px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .app-card:hover { background: rgba(255,255,255,0.05); }
    .app-icon { width: 60px; height: 60px; border-radius: 16px; object-fit: cover; }
    .hidden { display: none !important; }
    .flex { display: flex; } .flex-col { flex-direction: column; } .items-center { align-items: center; }
    .gap-2 { gap: 8px; } .mt-4 { margin-top: 16px; }
    .text-secondary { color: rgba(255,255,255,0.6); font-size: 14px; }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <template id="auth-template">
    <div class="glass" style="margin-top:20vh;">
      <h2 style="font-weight:700; margin-bottom:16px;">📱 AppHub</h2>
      <div id="login-form">
        <input type="email" id="email-login" placeholder="Email" autocomplete="email">
        <input type="password" id="password-login" placeholder="Mật khẩu">
        <button class="btn btn-primary" id="login-btn">Đăng nhập</button>
        <p class="text-secondary text-center mt-4" style="cursor:pointer;" id="go-register">Chưa có tài khoản? <b>Đăng ký</b></p>
      </div>
      <div id="register-form" class="hidden">
        <input type="email" id="email-reg" placeholder="Email">
        <input type="password" id="password-reg" placeholder="Mật khẩu">
        <input type="password" id="password-confirm" placeholder="Xác nhận mật khẩu">
        <button class="btn btn-primary" id="register-btn">Đăng ký</button>
        <p class="text-secondary text-center mt-4" style="cursor:pointer;" id="go-login">Đã có tài khoản? <b>Đăng nhập</b></p>
      </div>
    </div>
  </template>

  <template id="main-template">
    <div class="glass flex items-center justify-between">
      <h3 style="font-weight:700;">📥 Ứng dụng của bạn</h3>
      <button class="btn" style="width:auto; padding:8px 16px;" id="logout-btn">Đăng xuất</button>
    </div>
    <div id="app-list"></div>
  </template>

  <template id="app-detail-template">
    <div class="glass">
      <button class="btn" style="width:auto;" id="back-btn">← Quay lại</button>
      <div class="flex flex-col items-center gap-4 mt-4">
        <img id="detail-icon" class="app-icon" style="width:100px;height:100px;border-radius:24px;">
        <h2 id="detail-name"></h2>
        <a id="detail-link" class="btn btn-primary" target="_blank">📥 Tải xuống</a>
      </div>
    </div>
  </template>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE",
      databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "keyquocdat",
      storageBucket: "keyquocdat.appspot.com",
      authDomain: "keyquocdat.firebaseapp.com"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const appEl = document.getElementById('app');

    function render(templateId) {
      const template = document.getElementById(templateId);
      appEl.innerHTML = '';
      appEl.appendChild(template.content.cloneNode(true));
      if (templateId === 'auth-template') initAuth();
      else if (templateId === 'main-template') initMain();
      else if (templateId === 'app-detail-template') window._appDetailInit();
    }

    // AUTH
    function initAuth() {
      document.getElementById('login-btn').addEventListener('click', () => {
        const email = document.getElementById('email-login').value.trim();
        const pass = document.getElementById('password-login').value;
        auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
      });
      document.getElementById('register-btn').addEventListener('click', () => {
        const email = document.getElementById('email-reg').value.trim();
        const pass = document.getElementById('password-reg').value;
        const confirm = document.getElementById('password-confirm').value;
        if (pass !== confirm) return alert('Mật khẩu không khớp');
        auth.createUserWithEmailAndPassword(email, pass).catch(e => alert(e.message));
      });
      document.getElementById('go-register').addEventListener('click', () => {
        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('register-form').classList.remove('hidden');
      });
      document.getElementById('go-login').addEventListener('click', () => {
        document.getElementById('register-form').classList.add('hidden');
        document.getElementById('login-form').classList.remove('hidden');
      });
    }

    auth.onAuthStateChanged(user => {
      if (user) render('main-template');
      else render('auth-template');
    });

    // MAIN APP LIST
    function initMain() {
      document.getElementById('logout-btn').addEventListener('click', () => auth.signOut());
      const listEl = document.getElementById('app-list');
      db.ref('apps').on('value', snap => {
        const apps = snap.val() || {};
        listEl.innerHTML = '';
        Object.entries(apps).forEach(([id, app]) => {
          const card = document.createElement('div');
          card.className = 'app-card';
          card.innerHTML = `
            <img class="app-icon" src="${app.icon || ''}" alt="icon">
            <div style="flex:1;">
              <p style="font-weight:600;">${app.name}</p>
              <p class="text-secondary">${app.size || 'N/A'}</p>
            </div>
            <span style="font-size:20px;">→</span>
          `;
          card.addEventListener('click', () => {
            window._appDetail = { id, ...app };
            render('app-detail-template');
          });
          listEl.appendChild(card);
        });
      });
    }

    // APP DETAIL
    window._appDetailInit = function() {
      const app = window._appDetail;
      document.getElementById('back-btn').addEventListener('click', () => render('main-template'));
      document.getElementById('detail-icon').src = app.icon || '';
      document.getElementById('detail-name').textContent = app.name;
      const link = document.getElementById('detail-link');
      link.href = app.downloadLink || '#';
      link.textContent = '📥 Tải ' + app.name;
    };
  </script>
</body>
</html>
