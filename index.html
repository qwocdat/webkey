<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Opt Panel • QuocDat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-glow: #8a4bf3;
            --matrix-green: #00ff41;
            --matrix-red: #ff0044;
            --matrix-yellow: #ffff00;
            --glass-bg: rgba(255, 245, 255, 0.65);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'SF Pro Display', -apple-system, sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 30%, #f0eaff, #d9c9ff);
            background-image: repeating-linear-gradient(0deg, rgba(138, 43, 226, 0.03) 0px, rgba(138, 43, 226, 0.03) 2px, transparent 2px, transparent 8px), radial-gradient(circle at 30% 30%, #f0eaff, #d9c9ff);
            padding: 16px;
        }

        /* --- Panel Chính --- */
        .panel {
            width: 100%;
            max-width: 760px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1.5px solid rgba(180, 130, 255, 0.35);
            border-radius: 42px;
            box-shadow: 0 25px 50px rgba(105, 50, 180, 0.25), inset 0 1px 2px rgba(255, 255, 255, 0.8);
            padding: 32px;
            animation: appear 0.6s cubic-bezier(0.2, 0.9, 0.3, 1);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            border-bottom: 1px dashed #a07ae0;
            padding-bottom: 15px;
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(130deg, #481f77, #b46ef3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .prompt {
            margin-left: auto;
            font-family: 'Menlo', monospace;
            font-size: 0.85rem;
            color: #a33df0;
            background: rgba(200, 165, 255, 0.25);
            padding: 6px 15px;
            border-radius: 50px;
            border: 1px solid #c7a2ff;
        }

        /* --- Grid Chức Năng --- */
        .optimize-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .opt-card {
            background: rgba(255, 255, 255, 0.4);
            border: 1.5px solid rgba(190, 130, 250, 0.4);
            border-radius: 28px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .opt-card:hover {
            transform: translateY(-5px);
            background: white;
            border-color: #b27afe;
            box-shadow: 0 10px 20px rgba(139, 80, 255, 0.2);
        }

        .opt-card i { font-size: 35px; color: #7d3acb; margin-bottom: 10px; }
        .opt-card h3 { font-size: 1.1rem; color: #2d1b4e; }

        /* --- Terminal Matrix --- */
        .terminal-container {
            background: #0d0216;
            border-radius: 24px;
            border: 1px solid #7d3acb;
            padding: 15px;
            margin-top: 20px;
            box-shadow: inset 0 0 15px #2a0e4a;
        }

        .log-console {
            height: 220px;
            overflow-y: auto;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            padding-right: 5px;
        }

        /* Tùy chỉnh thanh cuộn terminal */
        .log-console::-webkit-scrollbar { width: 4px; }
        .log-console::-webkit-scrollbar-thumb { background: #4b2382; border-radius: 10px; }

        .log-line { display: flex; gap: 10px; margin-bottom: 4px; border-bottom: 0.1px solid rgba(125, 58, 203, 0.2); }
        .ts { color: #888; min-width: 65px; }
        .msg { flex: 1; word-break: break-all; }
        .stt { font-weight: bold; color: var(--matrix-green); }

        /* --- Progress Bar --- */
        .progress-container {
            height: 10px;
            background: rgba(125, 58, 203, 0.1);
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #b57aff, #00ff41);
            transition: width 0.1s linear;
        }

        /* --- Footer & Popups --- */
        .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #dabcff; }
        .owner { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #7d3acb; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        /* Overlay confirm */
        .confirm-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; z-index: 100;
            visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .confirm-overlay.show { visibility: visible; opacity: 1; }
        .confirm-card { background: white; padding: 30px; border-radius: 35px; width: 320px; text-align: center; transform: scale(0.8); transition: 0.3s; }
        .confirm-overlay.show .confirm-card { transform: scale(1); }
        .c-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; }
        .btn-ok { background: #7d3acb; color: white; }

        @keyframes appear { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="panel">
        <div class="header">
            <i class="fa-solid fa-microchip" style="color: #7d3acb; font-size: 24px;"></i>
            <h1>QuocDat Opt</h1>
            <div class="prompt">root@system:~#</div>
        </div>

        <div class="optimize-grid">
            <div class="opt-card" data-task="CLEAN">
                <i class="fa-solid fa-broom"></i>
                <h3>Dọn rác</h3>
            </div>
            <div class="opt-card" data-task="BOOST">
                <i class="fa-solid fa-bolt"></i>
                <h3>Tối ưu Game</h3>
            </div>
            <div class="opt-card" data-task="SECURITY">
                <i class="fa-solid fa-shield-virus"></i>
                <h3>Bảo mật</h3>
            </div>
        </div>

        <div class="progress-container" id="pContainer">
            <div class="progress-bar" id="pBar"></div>
        </div>

        <div class="terminal-container">
            <div class="log-console" id="console">
                <div class="log-line">
                    <span class="ts">[INFO]</span>
                    <span class="msg" style="color: #aaa;">Hệ thống sẵn sàng. Vui lòng chọn chức năng...</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="owner">
                <div class="avatar">QD</div>
                <div><strong>Quoc Dat</strong><br><small>Developer</small></div>
            </div>
            <button class="btn btn-ok" style="max-width: 120px;">Liên hệ</button>
        </div>
    </div>

    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-card">
            <h2 id="confirmTitle">Xác nhận</h2>
            <p id="confirmDesc" style="margin-top: 10px; color: #666;">Bạn có chắc chắn muốn thực hiện hành động này?</p>
            <div class="c-btns">
                <button class="btn" onclick="closeConfirm()">Hủy</button>
                <button class="btn btn-ok" id="btnGo">Thực thi</button>
            </div>
        </div>
    </div>

    <script>
        const payloads = [
            { m: "Accessing kernel memory...", s: "EXEC", c: "#00ff41" },
            { m: "Clearing cache at 0x884F...", s: "OK", c: "#00ff41" },
            { m: "Warning: Low entropy detected.", s: "WARN", c: "#ffff00" },
            { m: "Deleting temp files: 1.4GB", s: "OK", c: "#00ff41" },
            { m: "Optimizing GPU clock...", s: "DONE", c: "#00ff41" },
            { m: "Establishing secure link...", s: "SECURE", c: "#00ff41" },
            { m: "Error: Sector 7 blocked.", s: "FAIL", c: "#ff0044" },
            { m: "Retrying bypass logic...", s: "RETRY", c: "#ffff00" },
            { m: "Process prioritized (PID: 409).", s: "OK", c: "#00ff41" },
            { m: "Garbage collection success.", s: "OK", c: "#00ff41" },
            { m: "Finalizing optimization...", s: "EXEC", c: "#00ff41" }
        ];

        const logConsole = document.getElementById('console');
        const overlay = document.getElementById('confirmOverlay');
        let currentTask = "";

        // Mở confirm
        document.querySelectorAll('.opt-card').forEach(card => {
            card.onclick = () => {
                currentTask = card.getAttribute('data-task');
                document.getElementById('confirmTitle').innerText = card.querySelector('h3').innerText;
                overlay.classList.add('show');
            }
        });

        function closeConfirm() { overlay.classList.remove('show'); }

        // Logic chính
        document.getElementById('btnGo').onclick = () => {
            closeConfirm();
            document.getElementById('pContainer').style.display = 'block';
            logConsole.innerHTML = '';
            
            let lines = 0;
            const maxLines = 15;
            
            const run = setInterval(() => {
                if (lines >= maxLines) {
                    clearInterval(run);
                    addLog("TẤT CẢ TÁC VỤ HOÀN TẤT!", "SUCCESS", "#ffff00");
                    return;
                }

                const data = payloads[Math.floor(Math.random() * payloads.length)];
                addLog(data.m, data.s, data.c);
                
                // Cập nhật progress bar
                document.getElementById('pBar').style.width = ((lines / maxLines) * 100) + "%";
                lines++;
            }, 150);
        };

        function addLog(message, status, color) {
            const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `
                <span class="ts">[${time}]</span>
                <span class="msg" style="color: ${color}">${message}</span>
                <span class="stt" style="color: ${color}">[${status}]</span>
            `;
            logConsole.appendChild(line);
            
            // AUTO SCROLL
            logConsole.scrollTop = logConsole.scrollHeight;
        }
    </script>
</body>
</html>
