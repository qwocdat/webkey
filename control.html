<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cửa hàng - AI Chatbot</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f4f7f6; }
    
    /* Nút Robot */
    .robot-icon { position: fixed; bottom: 20px; right: 20px; font-size: 50px; cursor: pointer; transition: 0.3s; z-index: 1000; }
    #badge { position: absolute; top: 0; right: 0; background: red; color: white; font-size: 14px; font-weight: bold; padding: 2px 8px; border-radius: 50%; border: 2px solid white; display: none; }
    
    /* Hiệu ứng Thông báo */
    .shake { animation: shake 0.5s ease-in-out infinite; }
    .glow { filter: drop-shadow(0 0 15px rgba(255, 59, 48, 0.9)); }
    @keyframes shake {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(-15deg); }
      50% { transform: rotate(15deg); }
      75% { transform: rotate(-15deg); }
      100% { transform: rotate(0deg); }
    }

    /* Cửa sổ Chat */
    #chat-window { position: fixed; bottom: 90px; right: 20px; width: 320px; background: white; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: none; flex-direction: column; overflow: hidden; z-index: 999; }
    #chat-header { background: #007bff; color: white; padding: 15px; font-weight: bold; text-align: center; }
    #chat-messages { height: 300px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
    .msg { max-width: 80%; padding: 10px; border-radius: 15px; font-size: 14px; line-height: 1.4; }
    .msg.user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 0; }
    .msg.ai { background: #e9ecef; color: black; align-self: flex-start; border-bottom-left-radius: 0; }
    
    /* Khu vực nhập tin nhắn */
    #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #ddd; background: white; }
    #chat-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
    #send-btn { margin-left: 10px; padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>

  <h1>Trang Web Của Bạn</h1>
  <p>Khách hàng truy cập vào đây. Thử nhắn tin với Robot góc dưới nhé!</p>

  <!-- Nút Robot -->
  <div id="robot-btn" class="robot-icon">
    🤖 <span id="badge">1</span>
  </div>
  <audio id="noti-sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>

  <!-- Cửa sổ Chat -->
  <div id="chat-window">
    <div id="chat-header">Seller AI Trợ Lý</div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." autocomplete="off">
      <button id="send-btn">Gửi</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE",
      databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "keyquocdat"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentUid = null;
    let aiKnowledge = [];

    // 1. Tải kiến thức AI realtime vào RAM
    onValue(ref(db, 'knowledge'), (snap) => {
      aiKnowledge = [];
      if(snap.exists()) {
        snap.forEach(child => aiKnowledge.push(child.val()));
      }
    });

    // 2. Đăng nhập ẩn danh tạo UID cho mỗi khách
    signInAnonymously(auth).catch(err => console.error("Lỗi đăng nhập:", err));

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUid = user.uid;
        update(ref(db, `customers/${currentUid}`), { lastSeen: Date.now(), visitCount: 1 });
        listenToMessages();
      }
    });

    // 3. UI - Mở/Đóng chat và Tắt thông báo
    const robotBtn = document.getElementById('robot-btn');
    const chatWindow = document.getElementById('chat-window');
    const badge = document.getElementById('badge');
    const chatMessages = document.getElementById('chat-messages');
    const inputField = document.getElementById('chat-input');

    robotBtn.addEventListener('click', () => {
      chatWindow.style.display = chatWindow.style.display === 'flex' ? 'none' : 'flex';
      badge.style.display = 'none';
      robotBtn.classList.remove('glow', 'shake');
      if (chatWindow.style.display === 'flex') {
          chatMessages.scrollTop = chatMessages.scrollHeight;
      }
    });

    // 4. Gửi tin nhắn
    document.getElementById('send-btn').addEventListener('click', sendMessage);
    inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    function sendMessage() {
      const text = inputField.value.trim();
      if (!currentUid || !text) return;
      
      inputField.value = '';
      
      // Lưu tin nhắn User
      push(ref(db, `conversations/${currentUid}`), {
        text: text, sender: "user", timestamp: Date.now()
      });

      // AI xử lý trả lời sau 1 giây
      setTimeout(() => autoReplyAI(text), 1000);
    }

    // 5. Logic Seller AI xử lý từ khóa
    function autoReplyAI(userText) {
      const textLower = userText.toLowerCase();
      let answer = "Xin lỗi, hiện tại tôi chưa hiểu câu hỏi này. Bạn có thể nói rõ hơn không?";

      for (let item of aiKnowledge) {
        if(!item.keywords) continue;
        const keywords = item.keywords.split(',');
        const match = keywords.some(kw => textLower.includes(kw.trim().toLowerCase()));
        if (match) {
          answer = item.answer;
          break;
        }
      }

      push(ref(db, `conversations/${currentUid}`), {
        text: answer, sender: "ai", timestamp: Date.now()
      });
    }

    // 6. Lắng nghe tin nhắn Realtime & Kích hoạt thông báo
    function listenToMessages() {
      let isInitialLoad = true;
      onValue(ref(db, `conversations/${currentUid}`), (snapshot) => {
        chatMessages.innerHTML = '';
        let lastSender = '';

        if (snapshot.exists()) {
          snapshot.forEach((child) => {
            const msg = child.val();
            lastSender = msg.sender;
            const div = document.createElement('div');
            div.className = `msg ${msg.sender}`;
            div.innerText = msg.text;
            chatMessages.appendChild(div);
          });
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Kích hoạt hiệu ứng nếu có tin nhắn mới từ AI và hộp chat đang đóng
        if (!isInitialLoad && lastSender === 'ai' && chatWindow.style.display !== 'flex') {
          badge.style.display = 'block';
          robotBtn.classList.add('shake', 'glow');
          document.getElementById('noti-sound').play().catch(() => {});
          setTimeout(() => robotBtn.classList.remove('shake'), 2000); // Tắt rung sau 2s, giữ sáng
        }
        isInitialLoad = false;
      });
    }
  </script>
</body>
</html>
