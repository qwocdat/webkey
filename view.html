<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Xác Thực Nhận Key</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0b0b12; --glass-bg: rgba(30, 30, 45, 0.65); --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #30D158; --accent: #0A84FF; --text: #FFF; --subtext: #8E8E93;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 15px; 
            overflow: hidden; 
            background-image: radial-gradient(circle at top right, rgba(48, 209, 88, 0.12), transparent 50%), radial-gradient(circle at bottom left, rgba(10, 132, 255, 0.12), transparent 50%); 
            user-select: none; 
        }
        
        .container { width: 100%; max-width: 380px; text-align: center; z-index: 10; }
        .glass { background: var(--glass-bg); backdrop-filter: saturate(180%) blur(25px); -webkit-backdrop-filter: saturate(180%) blur(25px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px 20px; box-shadow: 0 12px 30px rgba(0,0,0,0.4); }

        #loadingStage { display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.3s ease; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #successStage { display: none; animation: scaleUp 0.45s var(--spring); }
        .icon-box { width: 60px; height: 60px; background: rgba(48, 209, 88, 0.15); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 15px; }
        .checkmark { width: 30px; height: 30px; stroke: var(--primary); stroke-width: 4; fill: none; stroke-dasharray: 50; stroke-dashoffset: 50; animation: drawCheck 0.4s ease forwards 0.2s; }
        @keyframes drawCheck { to { stroke-dashoffset: 0; } }

        .key-display-box { background: rgba(0,0,0,0.45); border: 1px dashed rgba(48, 209, 88, 0.4); border-radius: 14px; padding: 15px; margin: 20px 0; cursor: pointer; transition: 0.2s; }
        .key-display-box:active { transform: scale(0.98); }
        
        .key-text-input { width: 100%; background: transparent; border: none; color: var(--primary); font-size: 18px; font-weight: 800; text-align: center; letter-spacing: 0.5px; outline: none; cursor: pointer; font-family: monospace; }

        .hint { font-size: 12px; color: var(--subtext); line-height: 1.4; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleUp { from { opacity: 0; transform: scale(0.94) translateY(15px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .toast { position: fixed; top: -60px; left: 50%; transform: translateX(-50%); background: #30D158; color: #fff; border-radius: 30px; padding: 10px 22px; font-size: 13px; font-weight: bold; z-index: 1000; transition: 0.4s var(--spring); box-shadow: 0 4px 12px rgba(48,209,88,0.3); white-space: nowrap; }
        .toast.show { top: 20px; }
    </style>
</head>
<body>

    <div class="toast" id="toast">📋 Đã bôi xanh và tự động copy Key!</div>

    <div class="container">
        <div class="glass" id="loadingStage">
            <div class="spinner"></div>
            <h3 style="margin-bottom: 6px; font-size: 18px;">Đang Kiểm Tra & Xác Thực</h3>
            <p style="color: var(--subtext); font-size: 13px;">Hệ thống đang đối chiếu dữ liệu bypass...</p>
        </div>

        <div class="glass" id="successStage">
            <div class="icon-box">
                <svg viewBox="0 0 52 52" style="width:30px; height:30px;">
                    <path class="checkmark" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                </svg>
            </div>
            <h2 style="font-size: 20px;">Xác Thực Thành Công!</h2>
            <p style="color: var(--subtext); font-size: 13px; margin-top: 4px;">Mã Key VIP có hiệu lực sử dụng trong 6 giờ.</p>

            <div class="key-display-box" onclick="selectAndCopyKey()">
                <input type="text" id="keyOutput" class="key-text-input" readonly value="DAT-LOADING...">
            </div>

            <p class="hint">💡 Click thẳng vào ô mã viền đứt màu xanh ở trên để tự động bôi đen copy lại văn bản bất cứ lúc nào.</p>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE", databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "keyquocdat" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let targetKey = "";

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const paramK = urlParams.get('k');

            if (!paramK) {
                document.getElementById('loadingStage').innerHTML = `
                    <h3 style="color:#FF453A;">⚠️ Đường dẫn lỗi</h3>
                    <p style="color: var(--subtext); font-size: 13px; margin-top:8px;">Thiếu tham số mã hóa kiểm tra định danh.</p>
                `;
                return;
            }

            try {
                // Giải mã Base64 ngược trở lại chuỗi dạng DAT-XXXX thô để tra cứu Database
                targetKey = atob(paramK);
            } catch(e) {
                document.getElementById('loadingStage').innerHTML = `
                    <h3 style="color:#FF453A;">⚠️ Lỗi định dạng</h3>
                    <p style="color: var(--subtext); font-size: 13px; margin-top:8px;">Chuỗi mã hóa liên kết không hợp lệ.</p>
                `;
                return;
            }

            // Thời gian chờ vòng quay xác thực (2.5 giây)
            setTimeout(() => {
                verifyAndFetchKey();
            }, 2500);
        };

        function verifyAndFetchKey() {
            db.ref('vip_ff_keys/' + targetKey).once('value').then(snap => {
                if (snap.exists()) {
                    // Chuyển viewed sang true -> Mở khóa quyền đăng nhập cho index.html
                    db.ref('vip_ff_keys/' + targetKey).update({ viewed: true });

                    const inputEl = document.getElementById('keyOutput');
                    inputEl.value = targetKey;

                    document.getElementById('loadingStage').style.display = 'none';
                    document.getElementById('successStage').style.display = 'block';

                    setTimeout(() => { selectAndCopyKey(); }, 200);
                } else {
                    document.getElementById('loadingStage').innerHTML = `
                        <h3 style="color:#FF453A;">❌ Key Không Tồn Tại</h3>
                        <p style="color: var(--subtext); font-size: 13px; margin-top:8px;">Mã liên kết cấp key này đã bị xóa hoặc không hợp lệ.</p>
                    `;
                }
            }).catch(err => {
                document.getElementById('loadingStage').innerHTML = `
                    <h3 style="color:#FF453A;">❌ Lỗi Kết Nối</h3>
                    <p style="color: var(--subtext); font-size: 13px; margin-top:8px;">Vui lòng kiểm tra lại đường truyền mạng.</p>
                `;
            });
        }

        function selectAndCopyKey() {
            const inputEl = document.getElementById('keyOutput');
            inputEl.focus();
            inputEl.select(); 
            inputEl.setSelectionRange(0, inputEl.value.length);

            navigator.clipboard.writeText(inputEl.value).then(() => showToast())
            .catch(() => { document.execCommand('copy'); showToast(); });
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            if(navigator.vibrate) navigator.vibrate(40);
            setTimeout(() => t.classList.remove('show'), 2200);
        }
    </script>
</body>
</html>
