<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DAT | Key VIP</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #000; --glass-bg: rgba(30, 30, 40, 0.7); --glass-border: rgba(255, 255, 255, 0.15);
            --primary: #0A84FF; --text: #FFF; --subtext: #8E8E93;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(circle at top right, rgba(10, 132, 255, 0.15), transparent 50%), radial-gradient(circle at bottom left, rgba(138, 43, 226, 0.15), transparent 50%); user-select: none; padding: 20px; }
        
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .particle { position: absolute; bottom: -10px; width: 3px; height: 3px; background: rgba(255, 255, 255, 0.35); border-radius: 50%; animation: floatUp linear infinite; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100vh) scale(0.5); opacity: 0; } }

        .container { position: relative; z-index: 10; width: 100%; max-width: 400px; }
        .glass { background: var(--glass-bg); backdrop-filter: saturate(180%) blur(25px); -webkit-backdrop-filter: saturate(180%) blur(25px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; animation: fadeUp 0.6s var(--spring); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .logo { font-size: 40px; margin-bottom: 15px; }
        h1 { font-size: 22px; margin-bottom: 10px; }
        .key-box { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; padding: 20px; margin: 20px 0; word-break: break-all; font-family: monospace; font-size: 18px; font-weight: bold; color: #30D158; letter-spacing: 2px; position: relative; }
        .timer { font-size: 16px; color: var(--subtext); margin-bottom: 20px; }
        .timer span { color: #FF9F0A; font-weight: bold; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 18px; font-size: 17px; font-weight: 700; color: #fff; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(90deg, #0A84FF, #5E5CE6); margin-top: 10px; }
        .btn-copy { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); }
        .error { color: #FF453A; font-weight: 600; }
        .expired-message { display: none; }
    </style>
</head>
<body>
    <div class="particles" id="particlesContainer"></div>

    <div class="container">
        <div class="glass" id="mainCard">
            <div class="logo">🔑</div>
            <h1>KEY VIP CỦA BẠN</h1>
            <div id="keyContent">
                <div class="key-box" id="keyDisplay">Đang tải...</div>
                <div class="timer">⏳ Tự hủy trong: <span id="countdown">04:59</span></div>
                <button class="btn btn-copy" onclick="copyKey()">📋 SAO CHÉP KEY</button>
            </div>
            <div id="expiredContent" class="expired-message">
                <p class="error">⚠️ Phiên đã hết hạn hoặc Key đã bị vô hiệu hóa.</p>
                <p style="color: var(--subtext); margin-top: 10px;">Vui lòng quay lại trang chính để lấy link mới.</p>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE ---
        const firebaseConfig = { apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE", databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "keyquocdat" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();

        // --- TẠO BỤI BAY ---
        function createParticles() {
            const container = document.getElementById('particlesContainer');
            for(let i=0; i<40; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 6 + 4) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(p);
            }
        }

        // --- CHỐNG TRUY CẬP THẲNG ---
        function validateAccess() {
            const urlParams = new URLSearchParams(window.location.search);
            const keyToken = urlParams.get('key');
            
            // Kiểm tra có token không
            if (!keyToken) {
                showError('TRUY CẬP KHÔNG HỢP LỆ: Thiếu mã xác thực.');
                return null;
            }
            
            // Kiểm tra referrer (nới lỏng: cho phép từ link rút gọn hoặc trống - vì redirect có thể mất referrer)
            const referrer = document.referrer;
            const allowedDomains = ['novaturbo.vercel.app', 'taplayma.com', window.location.hostname];
            const isReferrerAllowed = referrer === '' || allowedDomains.some(domain => referrer.includes(domain));
            
            // Chúng ta vẫn cho phép nếu có token hợp lệ, nhưng ghi log cảnh báo nếu referrer lạ
            if (!isReferrerAllowed && referrer !== '') {
                console.warn('Cảnh báo: Referrer không xác định:', referrer);
            }
            
            return keyToken;
        }

        function showError(msg) {
            document.getElementById('keyDisplay').innerText = msg;
            document.getElementById('keyDisplay').style.color = '#FF453A';
            document.querySelector('.timer').style.display = 'none';
            document.querySelector('.btn-copy').style.display = 'none';
        }

        // --- KIỂM TRA KEY TRÊN FIREBASE ---
        async function fetchAndDisplayKey(token) {
            try {
                const snap = await db.ref('temp_keys/' + token).once('value');
                const data = snap.val();
                
                if (!data) {
                    showError('KEY KHÔNG TỒN TẠI.');
                    return;
                }
                
                const now = Date.now();
                
                // Kiểm tra hạn 6 tiếng
                if (data.expiresAt && now > data.expiresAt) {
                    showError('KEY ĐÃ HẾT HẠN (6 GIỜ).');
                    return;
                }
                
                // Kiểm tra đã dùng chưa
                if (data.used === true) {
                    showError('KEY NÀY ĐÃ ĐƯỢC SỬ DỤNG.');
                    return;
                }
                
                // Đánh dấu đã sử dụng NGAY LẬP TỨC
                await db.ref('temp_keys/' + token).update({ used: true, usedAt: now });
                
                // Hiển thị key (có thể là chính token hoặc một giá trị khác)
                const displayKey = data.key || token;
                document.getElementById('keyDisplay').innerText = displayKey;
                document.getElementById('keyDisplay').style.color = '#30D158';
                
                // Bắt đầu đếm ngược 5 phút (300 giây)
                startSelfDestruct(300);
                
            } catch (error) {
                console.error(error);
                showError('LỖI KẾT NỐI. VUI LÒNG THỬ LẠI.');
            }
        }

        // --- TỰ HỦY SAU 5 PHÚT ---
        let countdownInterval;
        function startSelfDestruct(seconds) {
            const countdownEl = document.getElementById('countdown');
            const keyContent = document.getElementById('keyContent');
            const expiredContent = document.getElementById('expiredContent');
            
            let remaining = seconds;
            
            const updateTimer = () => {
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                countdownEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if (remaining <= 30) {
                    countdownEl.style.color = '#FF453A';
                }
                
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    keyContent.style.display = 'none';
                    expiredContent.style.display = 'block';
                }
                remaining--;
            };
            
            updateTimer();
            countdownInterval = setInterval(updateTimer, 1000);
        }

        function copyKey() {
            const keyText = document.getElementById('keyDisplay').innerText;
            if (!keyText || keyText.includes('LỖI') || keyText.includes('Đang')) return;
            
            navigator.clipboard.writeText(keyText).then(() => {
                alert('✅ Đã sao chép key vào bộ nhớ tạm!');
            }).catch(() => {
                prompt('Sao chép thủ công:', keyText);
            });
        }

        // --- KHỞI TẠO ---
        window.onload = () => {
            createParticles();
            const token = validateAccess();
            if (token) {
                fetchAndDisplayKey(token);
            }
        };
    </script>
</body>
</html>
