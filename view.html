<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nhận Key VIP</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #000; --glass-bg: rgba(30, 30, 40, 0.45); --glass-border: rgba(255, 255, 255, 0.1); --primary: #0A84FF; --text: #FFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; background-image: radial-gradient(circle at top, rgba(10, 132, 255, 0.15), transparent 60%); }
        
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 35px 25px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        
        h2 { font-size: 22px; margin-bottom: 10px; color: #fff; }
        p.desc { color: #8E8E93; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        
        .key-box { background: rgba(0,0,0,0.5); border: 1px dashed #30D158; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .key-value { font-size: 20px; font-weight: bold; color: #30D158; letter-spacing: 1px; user-select: all; }
        
        .btn-copy { width: 100%; background: linear-gradient(90deg, #0A84FF, #5E5CE6); border: none; color: white; padding: 16px; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-copy:active { transform: scale(0.96); }
        
        .countdown { margin-top: 20px; font-size: 13px; color: #FF453A; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 5px; }
        
        .error-icon { font-size: 45px; margin-bottom: 15px; }
        
        /* Loading Spinner */
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="glass-panel" id="mainContainer">
        <div class="spinner" id="loadingSpinner"></div>
        <h2 id="titleStatus">Đang kiểm tra bảo mật...</h2>
        <p class="desc" id="descStatus">Vui lòng đợi trong giây lát.</p>
        
        <div id="successSection" style="display: none;">
            <div class="key-box">
                <div class="key-value" id="theKey">DAT-XXXX-XXXX-XXXX</div>
            </div>
            <button class="btn-copy" onclick="copyMyKey()">📋 Sao chép Key</button>
            <div class="countdown">
                ⏳ <span id="timerText">05:00</span> - Trang sẽ tự hủy
            </div>
        </div>
    </div>

    <script>
        // Phải cấu hình GIỐNG HỆT file index
        const firebaseConfig = { apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE", databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "keyquocdat" };
        firebase.initializeApp(firebaseConfig); 
        const db = firebase.database();

        let destructTimer;

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const keyParam = urlParams.get('k');

            if(!keyParam) return showError("Truy cập từ chối", "Không tìm thấy dữ liệu Key hợp lệ. Vui lòng quay lại bảng điều khiển để lấy link.");
            
            verifyAndShowKey(keyParam);
        };

        function verifyAndShowKey(keyStr) {
            const keyRef = db.ref('vip_ff_keys/' + keyStr);
            
            keyRef.once('value').then(snap => {
                if(!snap.exists()) {
                    return showError("Key không tồn tại", "Đường link này không hợp lệ hoặc đã bị hệ thống xóa bỏ.");
                }

                const data = snap.val();
                const now = Date.now();

                // 1. Kiểm tra thời hạn 5 phút của Link
                if(data.linkExpiresAt && now > data.linkExpiresAt) {
                    return showError("Link đã hết hạn", "Mỗi link chỉ có hiệu lực tối đa 5 phút sau khi tạo.");
                }

                // 2. Kiểm tra xem đã có người xem chưa (Mỗi link mở 1 lần)
                if(data.viewed === true) {
                    return showError("Đã được sử dụng", "Key này đã được hiển thị trước đó. Nhằm bảo mật, mỗi link vượt chỉ được mở 1 lần.");
                }

                // 3. Hợp lệ -> Đánh dấu là đã xem và hiển thị
                keyRef.update({ viewed: true }).then(() => {
                    document.getElementById('loadingSpinner').style.display = 'none';
                    document.getElementById('titleStatus').innerText = "Thành công!";
                    document.getElementById('titleStatus').style.color = "#30D158";
                    document.getElementById('descStatus').innerText = "Đây là Key VIP 6 Tiếng của bạn. Vui lòng sao chép ngay.";
                    
                    document.getElementById('theKey').innerText = keyStr;
                    document.getElementById('successSection').style.display = 'block';

                    startSelfDestruct(data.linkExpiresAt);
                });
            }).catch(error => {
                showError("Lỗi kết nối", "Không thể kết nối đến máy chủ xác thực.");
            });
        }

        function showError(title, desc) {
            document.getElementById('loadingSpinner').style.display = 'none';
            document.getElementById('titleStatus').innerHTML = `<div class="error-icon">❌</div>${title}`;
            document.getElementById('titleStatus').style.color = "#FF453A";
            document.getElementById('descStatus').innerText = desc;
            document.getElementById('successSection').style.display = 'none';
        }

        function startSelfDestruct(expireTime) {
            destructTimer = setInterval(() => {
                const diff = expireTime - Date.now();
                if(diff <= 0) {
                    clearInterval(destructTimer);
                    triggerSelfDestruct();
                } else {
                    const m = Math.floor(diff / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    document.getElementById('timerText').innerText = `0${m}:${s < 10 ? '0' : ''}${s}`;
                }
            }, 1000);
        }

        function triggerSelfDestruct() {
            document.body.innerHTML = `
                <div class="glass-panel" style="border-color: #FF453A;">
                    <div class="error-icon" style="color: #FF453A;">⚠️</div>
                    <h2 style="color: #FF453A;">Trang Đã Tự Hủy</h2>
                    <p style="color: #8E8E93; font-size: 14px; line-height: 1.5;">Thời gian xem Key đã kết thúc vì lý do bảo mật. Vui lòng quay lại Panel và tạo link mới nếu bạn chưa kịp lưu.</p>
                </div>
            `;
        }

        function copyMyKey() {
            const k = document.getElementById('theKey').innerText;
            navigator.clipboard.writeText(k).then(() => {
                const btn = document.querySelector('.btn-copy');
                btn.innerText = "✅ Đã sao chép thành công!";
                btn.style.background = "#30D158";
                setTimeout(() => { 
                    btn.innerText = "📋 Sao chép Key"; 
                    btn.style.background = "linear-gradient(90deg, #0A84FF, #5E5CE6)"; 
                }, 2000);
            });
        }
    </script>
</body>
</html>
