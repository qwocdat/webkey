<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin - Quản lý App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .admin-container { max-width: 700px; width: 100%; }
    .glass {
      background: rgba(28,28,30,0.65);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 12px 20px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      margin-top: 8px;
    }
    .btn-primary { background: white; color: black; border: none; }
    .btn-danger { background: rgba(255,69,58,0.15); border-color: rgba(255,69,58,0.3); }
    .btn:active { transform: scale(0.96); }
    input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 14px;
      color: white;
      width: 100%;
      margin-bottom: 8px;
      outline: none;
    }
    .app-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: rgba(255,255,255,0.02);
      border-radius: 18px;
      margin-bottom: 8px;
    }
    .app-row img { width: 40px; height: 40px; border-radius: 12px; margin-right: 12px; }
    .flex { display: flex; align-items: center; }
    .gap-1 { gap: 8px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="admin-container" id="admin-app">
    <div class="glass">
      <h2 style="font-weight:700;">🛠️ Admin - Thêm ứng dụng</h2>
      <input type="file" id="icon-file" accept="image/*">
      <img id="icon-preview" style="width:80px;height:80px;border-radius:20px;margin:10px 0;display:none;">
      <input type="text" id="app-name" placeholder="Tên ứng dụng">
      <input type="text" id="app-link" placeholder="Link tải về (URL)">
      <input type="text" id="app-size" placeholder="Dung lượng (VD: 45 MB)">
      <button class="btn btn-primary" id="upload-btn">📤 Đăng tải</button>
    </div>

    <div class="glass">
      <h3>📋 Danh sách ứng dụng</h3>
      <div id="app-list-admin"></div>
    </div>

    <div id="edit-modal" class="glass hidden" style="position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:10; width:90%; max-width:500px;">
      <h4>Chỉnh sửa</h4>
      <input type="text" id="edit-name" placeholder="Tên">
      <input type="text" id="edit-link" placeholder="Link">
      <input type="text" id="edit-size" placeholder="Dung lượng">
      <input type="file" id="edit-icon-file" accept="image/*">
      <img id="edit-icon-preview" style="width:60px;height:60px;border-radius:16px;margin:8px 0;display:none;">
      <div class="flex gap-1">
        <button class="btn btn-primary" id="save-edit-btn">Lưu</button>
        <button class="btn" id="cancel-edit-btn">Huỷ</button>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE",
      databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "keyquocdat",
      storageBucket: "keyquocdat.appspot.com",
      authDomain: "keyquocdat.firebaseapp.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    let currentEditId = null;

    // Upload icon + tạo app
    document.getElementById('upload-btn').addEventListener('click', async () => {
      const iconFile = document.getElementById('icon-file').files[0];
      const name = document.getElementById('app-name').value.trim();
      const link = document.getElementById('app-link').value.trim();
      const size = document.getElementById('app-size').value.trim();
      if (!name || !link) return alert('Nhập tên và link tải!');

      let iconUrl = '';
      if (iconFile) {
        const ref = storage.ref('app-icons/' + Date.now() + '_' + iconFile.name);
        await ref.put(iconFile);
        iconUrl = await ref.getDownloadURL();
      }

      const newAppRef = db.ref('apps').push();
      await newAppRef.set({
        name,
        downloadLink: link,
        icon: iconUrl,
        size: size || ''
      });

      alert('Đã thêm!');
      document.getElementById('app-name').value = '';
      document.getElementById('app-link').value = '';
      document.getElementById('app-size').value = '';
      document.getElementById('icon-file').value = '';
      document.getElementById('icon-preview').style.display = 'none';
    });

    // Preview icon khi chọn file
    document.getElementById('icon-file').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = ev => {
          document.getElementById('icon-preview').src = ev.target.result;
          document.getElementById('icon-preview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });

    // Danh sách app realtime
    function loadAppList() {
      db.ref('apps').on('value', snap => {
        const apps = snap.val() || {};
        const container = document.getElementById('app-list-admin');
        container.innerHTML = '';
        Object.entries(apps).forEach(([id, app]) => {
          const row = document.createElement('div');
          row.className = 'app-row';
          row.innerHTML = `
            <div class="flex" style="flex:1;">
              <img src="${app.icon || ''}" alt="icon">
              <div>
                <p style="font-weight:600;">${app.name}</p>
                <p style="font-size:13px; color:rgba(255,255,255,0.5);">${app.size || 'N/A'}</p>
              </div>
            </div>
            <div class="flex gap-1">
              <button class="btn" style="width:auto; padding:8px 12px;" data-edit="${id}">✏️</button>
              <button class="btn btn-danger" style="width:auto; padding:8px 12px;" data-delete="${id}">🗑</button>
            </div>
          `;
          container.appendChild(row);
        });

        // Gắn sự kiện edit/delete
        container.querySelectorAll('[data-edit]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = e.target.dataset.edit;
            const app = apps[id];
            currentEditId = id;
            document.getElementById('edit-name').value = app.name;
            document.getElementById('edit-link').value = app.downloadLink;
            document.getElementById('edit-size').value = app.size || '';
            document.getElementById('edit-icon-preview').style.display = 'none';
            document.getElementById('edit-modal').classList.remove('hidden');
          });
        });
        container.querySelectorAll('[data-delete]').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            if (confirm('Xoá ứng dụng này?')) {
              await db.ref('apps/' + e.target.dataset.delete).remove();
            }
          });
        });
      });
    }

    loadAppList();

    // Edit modal
    document.getElementById('cancel-edit-btn').addEventListener('click', () => {
      document.getElementById('edit-modal').classList.add('hidden');
    });
    document.getElementById('save-edit-btn').addEventListener('click', async () => {
      if (!currentEditId) return;
      const name = document.getElementById('edit-name').value.trim();
      const link = document.getElementById('edit-link').value.trim();
      const size = document.getElementById('edit-size').value.trim();
      const iconFile = document.getElementById('edit-icon-file').files[0];
      let iconUrl = undefined;
      if (iconFile) {
        const ref = storage.ref('app-icons/' + Date.now() + '_' + iconFile.name);
        await ref.put(iconFile);
        iconUrl = await ref.getDownloadURL();
      }
      const updateData = { name, downloadLink: link, size };
      if (iconUrl) updateData.icon = iconUrl;
      await db.ref('apps/' + currentEditId).update(updateData);
      document.getElementById('edit-modal').classList.add('hidden');
      alert('Đã cập nhật!');
    });
  </script>
</body>
</html>
