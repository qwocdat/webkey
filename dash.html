<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin Dashboard - QuocDat Drive</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: white;
      padding: 16px;
      display: flex;
      justify-content: center;
    }
    .dash-container {
      max-width: 1000px;
      width: 100%;
    }
    .glass {
      background: rgba(28,28,30,0.65);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 12px 20px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:active { transform: scale(0.96); }
    .btn-danger { background: rgba(255,69,58,0.2); border-color: rgba(255,69,58,0.3); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 16px; }
    .stat { font-size: 28px; font-weight: 700; }
    .text-secondary { color: rgba(255,255,255,0.6); }
    .flex { display: flex; } .items-center { align-items: center; } .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; } .mt-4 { margin-top: 16px; }
    .hidden { display: none; }
    input, select {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 12px;
      color: white;
      width: 100%;
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <div class="dash-container" id="dash-app">
    <div class="glass flex items-center justify-between">
      <h2 style="font-weight:700;">🛡️ Admin Panel</h2>
      <button class="btn" id="logout-btn">Đăng xuất</button>
    </div>
    <!-- Stats -->
    <div class="grid" id="stats-grid">
      <div class="glass"><p class="text-secondary">Tổng file</p><p class="stat" id="total-files">0</p></div>
      <div class="glass"><p class="text-secondary">Dung lượng</p><p class="stat" id="total-size">0 GB</p></div>
      <div class="glass"><p class="text-secondary">Người dùng</p><p class="stat" id="total-users">0</p></div>
      <div class="glass"><p class="text-secondary">Lượt tải</p><p class="stat" id="total-downloads">0</p></div>
    </div>
    <!-- Tabs -->
    <div class="flex gap-2 mt-4">
      <button class="btn tab-btn active" data-tab="users">Người dùng</button>
      <button class="btn tab-btn" data-tab="files">File</button>
      <button class="btn tab-btn" data-tab="keys">Quản lý Key</button>
      <button class="btn tab-btn" data-tab="logs">Log</button>
    </div>
    <!-- Tab content -->
    <div id="tab-content" class="glass mt-4"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE",
      databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "keyquocdat",
      storageBucket: "keyquocdat.appspot.com",
      authDomain: "keyquocdat.firebaseapp.com"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    let currentTab = 'users';

    auth.onAuthStateChanged(async user => {
      if (!user) {
        // Yêu cầu admin đăng nhập
        const email = prompt('Admin email:');
        const pass = prompt('Admin password:');
        if (email && pass) {
          try {
            await auth.signInWithEmailAndPassword(email, pass);
            // Kiểm tra quyền admin (bạn cần set trong database: admins/{uid}: true)
            const adminSnap = await db.ref(`admins/${auth.currentUser.uid}`).once('value');
            if (!adminSnap.val()) { alert('Không phải admin!'); auth.signOut(); }
          } catch(e) { alert(e.message); }
        }
      } else {
        loadDashboard();
      }
    });

    document.getElementById('logout-btn').addEventListener('click', () => auth.signOut());

    function loadDashboard() {
      // Stats realtime
      db.ref('files').on('value', snap => {
        const allFiles = snap.val() || {};
        let totalFiles = 0, totalSize = 0, totalDownloads = 0;
        Object.values(allFiles).forEach(userFiles => {
          Object.values(userFiles).forEach(file => {
            totalFiles++;
            totalSize += file.size || 0;
            totalDownloads += file.downloads || 0;
          });
        });
        document.getElementById('total-files').textContent = totalFiles;
        document.getElementById('total-size').textContent = (totalSize / 1e9).toFixed(2) + ' GB';
        document.getElementById('total-downloads').textContent = totalDownloads;
      });
      // Users count (có thể lưu ở /users)
      db.ref('users').on('value', snap => {
        document.getElementById('total-users').textContent = snap.numChildren();
      });

      // Tabs
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentTab = btn.dataset.tab;
          renderTab(currentTab);
        });
      });
      renderTab('users');
    }

    function renderTab(tab) {
      const container = document.getElementById('tab-content');
      switch(tab) {
        case 'users': renderUsers(container); break;
        case 'files': renderFiles(container); break;
        case 'keys': renderKeys(container); break;
        case 'logs': container.innerHTML = '<p>Log hệ thống...</p>'; break;
      }
    }

    function renderUsers(container) {
      container.innerHTML = '<h3 class="mb-4">Danh sách người dùng</h3><div id="user-list"></div>';
      db.ref('users').on('value', snap => {
        const users = snap.val() || {};
        const list = document.getElementById('user-list');
        list.innerHTML = '';
        Object.entries(users).forEach(([uid, data]) => {
          const div = document.createElement('div');
          div.className = 'flex items-center justify-between p-3';
          div.innerHTML = `
            <span>${data.email || uid}</span>
            <button class="btn btn-danger" data-uid="${uid}">Ban</button>
          `;
          div.querySelector('button').addEventListener('click', async () => {
            await db.ref(`users/${uid}`).update({ banned: true });
            alert('Đã ban user ' + uid);
          });
          list.appendChild(div);
        });
      });
    }

    function renderFiles(container) {
      container.innerHTML = '<h3>Quản lý file</h3><div id="files-admin-list"></div>';
      db.ref('files').on('value', snap => {
        const all = snap.val() || {};
        const list = document.getElementById('files-admin-list');
        list.innerHTML = '';
        Object.entries(all).forEach(([uid, files]) => {
          Object.entries(files).forEach(([fileId, file]) => {
            const div = document.createElement('div');
            div.className = 'flex items-center justify-between p-3';
            div.innerHTML = `
              <span class="truncate">${file.name} (${uid})</span>
              <button class="btn btn-danger" data-uid="${uid}" data-fileid="${fileId}">Xoá</button>
            `;
            div.querySelector('button').addEventListener('click', async () => {
              await db.ref(`files/${uid}/${fileId}`).remove();
              // Xoá storage
              firebase.storage().refFromURL(file.url).delete().catch(()=>{});
            });
            list.appendChild(div);
          });
        });
      });
    }

    function renderKeys(container) {
      container.innerHTML = `
        <h3>Tạo key mới</h3>
        <input id="new-key" placeholder="Key string">
        <select id="key-type"><option value="ONCE">ONCE</option><option value="TIME">TIME</option><option value="INFINITE">INFINITE</option></select>
        <input id="key-expire" type="datetime-local" placeholder="Hết hạn (nếu TIME)">
        <button class="btn mt-4" id="create-key-btn">Tạo Key</button>
        <div id="key-list" class="mt-4"></div>
      `;
      document.getElementById('create-key-btn').addEventListener('click', async () => {
        const key = document.getElementById('new-key').value.trim();
        const type = document.getElementById('key-type').value;
        const expire = document.getElementById('key-expire').value;
        if (!key) return alert('Nhập key');
        const data = { type, used: false, disabled: false };
        if (type === 'TIME' && expire) data.expiresAt = new Date(expire).getTime();
        await db.ref(`keys/${key}`).set(data);
        alert('Đã tạo key!');
      });
      // Danh sách key
      db.ref('keys').on('value', snap => {
        const keys = snap.val() || {};
        const list = document.getElementById('key-list');
        list.innerHTML = Object.entries(keys).map(([k, v]) => 
          `<div class="flex justify-between p-2"><span>${k} (${v.type})</span><button class="btn btn-danger" data-key="${k}">Xoá</button></div>`
        ).join('');
        list.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', () => db.ref(`keys/${btn.dataset.key}`).remove());
        });
      });
    }
  </script>
</body>
</html>
