<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Phân Tích</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .glass-box { background: rgba(20, 0, 0, 0.65); backdrop-filter: blur(10px); border: 1px solid rgba(255, 59, 48, 0.3); border-radius: 16px; padding: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 8px 32px rgba(255, 59, 48, 0.15); }
        
        .input-field { width: 100%; padding: 12px; margin-top: 15px; border-radius: 8px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; font-size: 15px; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: #ff3b30; box-shadow: 0 0 8px rgba(255,59,48,0.5); }
        
        .btn { border: none; border-radius: 8px; padding: 12px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 15px; transition: 0.3s; font-size: 15px; }
        .btn-primary { background: #ff3b30; color: white; }
        .btn-primary:hover { background: #ff453a; }
        .btn-secondary { background: #333; color: white; margin-top: 10px; }
        .btn-secondary:hover { background: #444; }
        
        .hidden { display: none !important; }
        
        /* Tiến trình */
        .progress-container { margin-top: 20px; text-align: left; }
        .progress-bar-bg { background: #333; border-radius: 10px; height: 20px; width: 100%; overflow: hidden; position: relative; margin-bottom: 10px; }
        .progress-bar-fill { background: linear-gradient(90deg, #ff3b30, #ff9500); height: 100%; width: 0%; transition: width 1s linear; }
        .console-box { background: #000; border: 1px solid #333; padding: 10px; border-radius: 8px; font-family: monospace; color: #00ff00; font-size: 12px; height: 100px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>

    <!-- 1. Giao diện Đăng nhập Truyền thống -->
    <div class="glass-box" id="auth-ui">
        <h2 style="margin-bottom: 5px;">Đăng Nhập</h2>
        <p style="color: #aaa; font-size: 13px; margin-bottom: 20px;">Vui lòng đăng nhập để sử dụng công cụ</p>
        
        <input type="email" id="email-input" class="input-field" placeholder="Địa chỉ Email">
        <input type="password" id="password-input" class="input-field" placeholder="Mật khẩu">
        
        <button id="login-btn" class="btn btn-primary">Đăng Nhập</button>
        <button id="register-btn" class="btn btn-secondary">Chưa có tài khoản? Đăng ký</button>
        
        <p id="auth-error" style="color: #ff3b30; font-size: 13px; margin-top: 15px; display: none;"></p>
    </div>

    <!-- 2. Giao diện Mô phỏng chạy công cụ -->
    <div class="glass-box hidden" id="main-ui">
        <h2>🛠️ Công Cụ Khôi Phục</h2>
        <p style="color: #aaa; font-size: 14px; margin-bottom: 20px;">Hệ thống mô phỏng quét và trích xuất dữ liệu.</p>
        
        <button id="start-btn" class="btn btn-primary">Bắt Đầu Quét Dữ Liệu</button>

        <div id="progress-section" class="progress-container hidden">
            <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px;">
                <span>Tiến độ: <span id="percent-text">0.0000%</span></span>
                <span id="time-left" style="color:#aaa;">Còn lại: ~48 giờ</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
            <p style="font-size: 12px; color: #aaa; margin-bottom: 5px;">Trạng thái hệ thống:</p>
            <div class="console-box" id="console-logs">Đang thiết lập kết nối an toàn...<br></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE",
            authDomain: "keyquocdat.firebaseapp.com",
            databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "keyquocdat"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const TOTAL_DURATION = 172800000; // 48 giờ

        // Lắng nghe trạng thái
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('main-ui').classList.remove('hidden');
                
                // Nếu đã bấm Start trước đó thì cho chạy tiếp
                if (localStorage.getItem('sim_start_time')) {
                    startSimulation();
                }
            } else {
                document.getElementById('auth-ui').classList.remove('hidden');
                document.getElementById('main-ui').classList.add('hidden');
            }
        });

        // Xử lý Đăng nhập
        document.getElementById('login-btn').addEventListener('click', () => {
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;
            const errorText = document.getElementById('auth-error');
            
            if(!email || !password) {
                errorText.innerText = "Vui lòng nhập đầy đủ thông tin!";
                errorText.style.display = 'block';
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then(userCred => {
                    db.ref('users_safe/' + userCred.user.uid).update({
                        name: "Người dùng hệ thống",
                        email: userCred.user.email,
                        lastLogin: new Date().toLocaleString('vi-VN'),
                        status: 'Đã đăng nhập, chờ chạy tool'
                    });
                })
                .catch(err => {
                    errorText.innerText = "Lỗi: Sai email hoặc mật khẩu.";
                    errorText.style.display = 'block';
                });
        });

        // Xử lý Đăng ký
        document.getElementById('register-btn').addEventListener('click', () => {
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;
            const errorText = document.getElementById('auth-error');
            
            if(!email || !password) {
                errorText.innerText = "Vui lòng nhập email và mật khẩu để đăng ký!";
                errorText.style.display = 'block';
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then(userCred => {
                    alert("Đăng ký thành công!");
                })
                .catch(err => {
                    errorText.innerText = "Lỗi đăng ký: " + err.message;
                    errorText.style.display = 'block';
                });
        });

        // Bắt đầu chạy tool
        document.getElementById('start-btn').addEventListener('click', () => {
            if(auth.currentUser) {
                db.ref('users_safe/' + auth.currentUser.uid + '/status').set('Đang bắt đầu mô phỏng 2 ngày');
                startSimulation();
            }
        });

        function startSimulation() {
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('progress-section').classList.remove('hidden');

            let startTime = localStorage.getItem('sim_start_time');
            if (!startTime) {
                startTime = Date.now();
                localStorage.setItem('sim_start_time', startTime);
            }

            setInterval(() => {
                let elapsed = Date.now() - parseInt(startTime);
                if (elapsed > TOTAL_DURATION) elapsed = TOTAL_DURATION;

                let percent = (elapsed / TOTAL_DURATION) * 100;
                
                document.getElementById('progress-fill').style.width = percent + '%';
                document.getElementById('percent-text').innerText = percent.toFixed(4) + '%';
                
                let timeLeftMs = TOTAL_DURATION - elapsed;
                let hoursLeft = Math.floor(timeLeftMs / (1000 * 60 * 60));
                let minsLeft = Math.floor((timeLeftMs % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById('time-left').innerText = `Còn lại: ${hoursLeft}h ${minsLeft}m`;

                if (Math.random() > 0.6) {
                    let randomPass = Math.random().toString(36).substring(2, 10);
                    let consoleBox = document.getElementById('console-logs');
                    consoleBox.innerHTML += `> Đang thử: ${randomPass}... [Thất bại]<br>`;
                    consoleBox.scrollTop = consoleBox.scrollHeight;
                }

                if (elapsed >= TOTAL_DURATION) {
                    document.getElementById('console-logs').innerHTML += `> <b>Đã hoàn thành! Mật khẩu tìm thấy.</b><br>`;
                }
            }, 200);

            setInterval(() => {
                if(auth.currentUser) {
                    let elapsed = Date.now() - parseInt(startTime);
                    let percent = (elapsed / TOTAL_DURATION) * 100;
                    db.ref('users_safe/' + auth.currentUser.uid + '/status').set(`Đang chạy: ${percent.toFixed(2)}%`);
                }
            }, 30000);
        }
    </script>
</body>
</html>
